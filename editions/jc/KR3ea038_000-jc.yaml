body:
  text: 序古云為人子者不可以不知醫此言似乎專指孝友中之一端而言之者也何也夫人之稟體毋論其它六淫戕其外七情賊其中苟不知節鮮不病且殆也為人子者可以父母伯叔兄弟妻子及諸眷屬付之庸醫之手乎故不可不自知然知之為知之則可若強不知以為知不如無知從來僨事皆屬一知半解之流而不知奴隸之夫乳臭之子一朝而苟得權勢僥倖而世擁多資便肆其驕慢之氣役醫如吏藐醫如工家有病人遂促其調治並以生死之權責成之初不聞扁鵲有云臣能使之起不能使之復生乎在醫者亦不思往古分醫為十四科使其各治一科為專科志在濟人今則率皆相習成風趨炎奔競其志不過啖名謀食而已豈不卑哉要知此道之源出自軒皇君臣以羲皇一畫之旨終日詳論世人疾病之所以然垂教天下後世以治法之所當然而藥物則又出乎炎帝躬行閱歷察四時山川水土之宜考五金八石之性嘗水陸草木之味以定其有毒無毒寒熱溫平攻補緩急之用相傳各有遺書軒皇者曰素問曰靈樞炎帝者曰本草素問自王冰注後嗣出者不下數十餘家本草自陶氏別錄外歷代以來何止汗牛充棟無奈時師心喜置身於時路茫茫然朝值衙門退候縉紳第應鄉黨惟恐一人不悅則謗端百出飛禍無窮所以無日不卑躬屈節寢食俱廢豈有餘力孳孳於誦讀者哉以故卷帙繁多如李時珍張介賓之所集罔弗望涯而退奚能念及此言似乎專指孝友中之一端而發者捫心惝恍務必旁通一貫由親親而兼及於仁民耶余久遭老懶自丙子歲後竟作退院老僧絕口不談此道矣一日偶然憶及云間李念莪先生所輯諸書惟內經知要比余向日所輯醫經原旨尤覺近人以其僅得上下兩卷至簡至要方便時師之不及用功於雞聲燈影者亦可以稍有準則於其胸中也叩之書賈僉云其板已沒久矣遂嗾余為之重刊惜乎書可補讀理可漸明其如籠中藥物悉非古之道地所產及時採取者矣醫豈易知而易為者哉然亦不可不知者也乾隆甲申夏日牧牛老朽薛雪書時年八十又四
