body:
  text: 卷下一經絡靈樞經脈篇曰肺手太陰之脈起於中焦手之三陰從臟走手故手太陰肺脈起於中焦當胃之中脘也十二經者營也故曰營行脈中首言肺者肺朝百脈也循序相傳盡於肝經終而復始又傳於肺是為一周下絡大腸肺與大腸為表裡故絡大腸凡十二經相通各有表裡在本經者曰屬他經者曰絡還循胃口還復也循繞也下絡大腸還上循胃口上膈屬肺身中膈膜居心肺之下前齊鳩尾後齊十一椎周圍相著以隔濁氣不使熏於肺也從肺系橫出腋下肺系喉嚨也腋下者膊下脅上也下循臑內臑者膊之內側上至腋下至肘也行少陰心主之前少陰者心也心主者胞絡也手之三陰太陰在前厥陰在中少陰在後下肘中循臂內膊與臂之交曰肘內者內側也上骨下廉入寸口骨掌後高骨也下廉骨下側也寸口即動脈也上魚循魚際手腕之上大指之下肉隆如魚故曰魚寸口之上魚之下曰魚際穴出大指之端端指尖也手太陰肺經止於此其支者從腕後直出次指內廉出其端支者如木之枝也正經之外復有旁分之絡此本經別絡從腕後直出次指之端交商陽穴而接手陽明經也大腸手陽明之脈起於大指次指之端次指食指也手之三陽從手至頭循指上廉出合谷兩骨之間上廉上側也凡諸經脈陽行於外陰行於內後諸經皆同合谷穴名兩骨即大指次指後岐骨也俗名虎口上入兩筋之中腕中上側兩筋陷中陽溪穴也循臂上廉入肘外廉上臑外前廉上肩出髃骨之前廉肩端骨罅為髃骨上出於柱骨之會上背之上頸之根為天柱骨六陽皆會於督脈之大椎是為會上下入缺盆絡肺下膈屬大腸自大椎而前入缺盆絡肺復下膈當臍旁屬於大腸其支者從缺盆上頸貫頰入下齒中耳下曲處為頰還出挾口交人中左之右右之左上挾鼻孔人中即督脈之水溝穴由人中而左右互交上挾鼻孔手陽明經止於此自山根交承泣而接足陽明經也胃足陽明之脈起於鼻之交頞中頞鼻莖也又名山根足之三陽從頭走足旁納太陽之脈納入也足太陽起於目內眥與頞交近下循鼻外入上齒中還出挾口環唇下交承漿環繞也承漿任脈穴卻循頤後下廉出大迎腮下為頷頷下為頤循頰車上耳前過客主人循髮際至額顱頰車在耳下本經穴也客主人在耳前足少陽經穴也發之前際為額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾絡脾者胃與脾為表裡也其直者從缺盆下乳內廉下挾臍入氣街中氣街即氣衝也在毛際兩旁鼠鼷上一寸其支者起於胃口下循腹裡下至氣街中而合胃口者胃之下口即幽門也支者與直者會合於氣街以下髀關抵伏兔下膝臏中下循脛外廉下足跗入中指內間抵至也髀關伏兔皆膝上穴也膝蓋曰臏䯒骨曰脛足面曰跗由跗而入足之中指內間足陽明經止於此其支者下廉三寸而別下入中指外間其支者別跗上入大指間出其端陽明別絡入中指外間又其支者別行入大指間斜出足厥陰行間之次循大指出其端而接足太陰經也脾足太陰之脈起於大指之端足之三陰從足走腹故足太陰脈發於此循指內側白肉際過核骨後上內踝前廉核骨在足大指本節後圓骨也滑氏誤作孤拐骨上踹音傳內循脛骨後交出厥陰之前足肚曰踹交出厥陰之前即地機陰陵泉也上膝股內前廉股大腿也前廉者上側也當血海箕門之次入腹屬脾絡胃脾胃為表裡故屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃別上膈注心中足太陰外行者由腹上府舍腹結等穴散於胸中而止於大包其內行而支者自胃脘上膈注心而接手少陰經也心手少陰之脈起於心中出屬心系心當五椎之下其繫有五上系連肺肺下繫心心下三系連脾肝腎故心通五臟而為之主也下膈絡小腸心與小腸為表裡故下膈當臍上二寸下脘之分絡小腸也其支者從心系上挾咽系目系其直者復從心系卻上肺下出腋下出腋下上行極泉穴手少陰經行於外者始此下循臑內後廉行太陰心主之後臑內後廉青靈穴也手之三陰少陰居太陰厥陰之後下肘內循臂內後廉抵掌後鋭骨之端手腕下踝為鋭骨神門穴也入掌內後廉循小指之內出其端手少陰經此於此乃交小指外側而接手太陽經也滑氏曰心為君主尊於他臟故其交經授受不假支別云小腸手太陽之脈起於小指之端循手外側上腕出踝中前谷後溪腕骨等穴直上循臂骨下廉出肘內側兩筋之間循臂下廉陽谷等穴出肘內側兩骨尖陷中小海穴也上循臑外後廉行手陽明少陽之外出肩解繞肩胛交肩上肩後骨縫曰肩解肩胛者臑腧天宗等處肩上者秉風曲垣等穴左右交於兩肩之上會於督脈之大椎入缺盆絡心心與小腸為表裡循咽下膈抵胃屬小腸循咽下膈抵胃當臍上二寸屬小腸此本經之行於內者其支者從缺盆循頸上頰至目鋭眥卻入耳中其支行於外者出缺盆循頸中之天窗上頰後之天容由顴髎以入耳中聽宮穴也手太陰經止於此其支者別頰上䪼抵鼻至目內眥斜絡於顴目下為䪼目內角為內眥顴即顴髎穴手太陽自此交目內眥而接足太陽經也膀胱足太陽之脈起於目內眥上額交巔由攢竹上額歷曲差五處等穴自絡卻穴左右斜行而交於巔頂之百會其支者從巔至耳上角支者由百會旁行至耳上角過足少陽之曲鬢率谷天衝浮白竅陰完骨故此六穴者皆足太陽少陽之會其直者從巔入絡腦自百會通天絡卻玉枕入絡於腦還出別下項循肩髆內挾脊抵腰中腦後復出別下項由天柱而下會督脈之大椎陶道卻循肩髆內作四行而下挾脊抵腰入循膂絡腎屬膀胱腎與膀胱為表裡也夾脊兩旁之肉曰膂其支者從腰中下挾脊貫臀入膕中尻旁大肉曰臀膝後曲處曰膕其支者從髆內左右別下貫胛挾脊內此支言肩髆內大杼下外兩行也左右貫胛去脊各三寸別行歷附分魄戶膏肓等穴挾脊下過髀樞過髀樞循髀外從後廉下合膕中會於足少陽之環跳循髀外後廉去承扶一寸五分之間下行復與前之入膕中者相會合以下貫踹內出外踝之後循京骨至小指外側小指本節後大骨曰京骨足太陽經穴止此乃交於小指之下而接足少陰經也腎足少陰之脈起於小指之下邪走足心出於然谷之下循內踝之後別入跟中然谷在內踝前大骨下內踝之後別入跟中即太溪大鐘等穴以上踹內出膕內廉上股內後廉貫脊屬腎絡膀胱上股內後廉結於督脈之長強以貫脊而後屬於腎前當關元中極而絡於膀胱相為表裡也其直者從腎上貫肝膈入肺中循喉嚨挾舌本其直行者從肓俞屬腎處上行循商曲石關陰都通谷諸穴貫肝上循幽門上膈歷於步廊入肺中循神封靈墟神藏彧中俞府而上循喉嚨並人迎挾舌本而終其支者從肺出絡心注胸中支者自神藏之際從肺絡心至胸以上俞府諸穴足少陰經止於此而接手厥陰經也心主手厥陰心包絡之脈起於胸中心主者心之所主也胞絡為心之府故名出屬心胞絡下膈歷絡三焦胞絡為心君之外衛三焦為臟腑之外衛故為表裡而相絡諸經皆無歷字獨此有之達上中下也其支者循胸出脅下腋三寸腋下三寸天池手厥陰經穴始此上抵腋下循臑內行太陰少陰之間上抵腋下之天泉循臑內行太陰少陰之間以手之三陰厥陰在中也入肘中下臂行兩筋之間入肘中曲澤也下臂行兩筋之間郤門間使內關大陵也入掌中循中指出其端掌中勞宮也中指端中衝也手厥陰經止於此其支者別掌中循小指次指出其端次指者無名指也支者自勞宮別行無名指端而接乎手少陽經也三焦手少陽之脈起於大指次指之端上出兩指之間即小指次指之間液門中渚穴循手表腕出臂外兩骨之間手表腕陽池也臂外兩骨間外關支溝等穴上貫肘循臑外上肩而交出足少陽之後上貫肘之天井循臑外歷清冷淵消濼臑會上肩髎自天髎而交出足少陽之後也入缺盆布膻中散絡心包下膈循屬三焦內行者入缺盆復由足陽明之外下布膻中散絡心包相為表裡自上焦下膈循中焦以約下焦其支者從膻中上出缺盆上項系耳後直上出耳上角以屈下頰至䪼其支行於外者自膻中上缺盆會於督脈之大椎循天牖系耳後之翳風瘈脈顱息出耳上角過足少陽之懸釐頷厭下行耳頰至䪼其支者從耳後入耳中出走耳前過客主人前交頰至目鋭眥此支從耳後翳風入耳中過手太陽之聽宮出走耳前過足少陽之客主人交頰上絲竹空至目鋭眥會於瞳子髎手少陽經止於此而接足少陽經也膽足少陽之脈起於目鋭眥上抵頭角下耳後由聽會客主人抵頭角下耳後行天衝浮白竅陰完骨循頸行手少陽之前至肩上卻交出手少陽之後入缺盆循頸過手少陽之天牖行少陽之前下至肩上循肩井復交出手少陽之後過督脈之大椎而入於足陽明缺盆之外其支者從耳後入耳中出走耳前至目鋭眥後從耳後顳顬過手少陽之翳風過手太陽之聽宮出走耳前復自聽會至目鋭眥其支者別鋭眥下大迎合於手少陽抵於䪼支者別自目外眥下足陽明大迎由手少陽之絲竹和髎而抵於䪼下加頰車下頸合缺盆自頰車下頸循本經之前與前之入缺盆者會合以下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中下胸當手厥陰天池之分貫膈足厥陰期門之分絡肝本經日月之分屬膽而相為表裡乃循脅裡由足厥陰章門下行出足陽明氣街繞毛際合於足厥陰以橫入髀厭中環跳穴其直者從缺盆下腋循胸過季脅下合髀厭中直而行於外者從缺盆下行復與前之入髀厭者會合以下循髀陽出膝外廉下外輔骨之前髀陽髀之外側也輔骨膝兩旁高骨也由髀陽曆中瀆陽關出膝外廉下外輔骨之前自陽陵泉以下陽交等穴直下抵絶骨之端下出外踝之前循足跗上入小指次指之間外踝上骨際曰絶骨陽輔穴也下行懸鐘循足面入小指次指之間至竅陰穴足少陽經止於此其支者別跗上入大指之間循大指岐骨內出其端還貫爪甲出三毛足大指次指本節後骨縫為岐骨大指爪甲後二節間為三毛自此接足厥陰經肝足厥陰之脈起於大指叢毛之際叢毛即三毛也上循足跗上廉去內踝一寸足面上行間太衝也內踝一寸中封也上踝八寸交出太陰之後上膕內廉上踝過足太陰之三陰交歷蠡溝中都交出太陰之後上膕內廉至膝關曲泉也循股陰入毛中過陰器股陰內側也循股內之陰包五里陰廉上會於足太陰之衝門府舍入陰毛中急脈左右相交環繞陰器而會於任脈之曲骨抵小腹挾胃屬肝絡膽入小腹會於任脈之中極關元循章門至期門挾胃屬肝下足少陽日月之所絡膽肝膽相為表裡也上貫膈布脅肋貫膈行足太陰食竇之外大包之裡布脅肋上足少陽淵腋手太陰雲門足厥陰經穴止此循喉嚨之後上入頏顙連目系上出額與督脈會於巔頏顙咽顙也目內深處為目系其內行而上者循喉嚨後入頏顙行足陽明大迎地倉四白之外內連目系上出足少陽陽白之外臨泣之裡與督脈會於巔之百會穴其支者從目系下頰裡環唇內從目系下行任脈之外本經之裡下頰環唇其支者復從肝別貫膈上注肺從前期門屬肝之所行足太陰食竇之外本經之裡別貫膈上注肺下行挾中脘之分復接手太陰肺經十二經一周已盡也骨空論曰任脈者起於中極之下以上毛際循腹裡上關元至咽喉上頤循面入目以下任督沖蹺皆奇經也無表裡配合故謂之奇中極任脈穴也在曲骨上一寸中極之下為胞宮任督沖三脈皆起於胞宮而出於會陰任由會陰而行腹督由會陰而行背沖由會陰出並少陰而散胸中衝脈者起於氣街並少陰之經挾臍上行至胸中而散起者外脈所起非發源也氣街即氣衝在毛際兩旁起於氣街並足少陰之經會於橫骨大赫等十一穴挾臍上行至胸中而散此衝脈之前行者也然少陰之脈上股內後廉貫脊屬腎衝脈亦入脊內伏沖之脈然則衝脈之後行者當亦並少陰無疑也任脈為病男子內結七疝女子帶下瘕聚任脈自前陰上毛際行腹裡故男女之為病若此也衝脈為病逆氣裡急衝脈挾臍上行至胸氣不順則逆血不和則急也督脈為病脊強反折督脈貫脊故病如此督脈者起於少腹以下骨中央女子入系廷孔少腹乃胞宮之所居骨中央者橫骨下近外之中央也廷正也直也廷孔溺孔也其孔溺孔之端也女人溺孔在前陰中橫骨之下孔之上際謂之端乃督脈外起之所雖言女子然男子溺孔亦在橫骨下中央第為宗筋所函故不見耳其絡循陰器合篡間繞篡後篡者交篡之義即前後二陰之間也別繞臀至少陰與巨陽中絡者合少陰上股內後廉貫脊屬腎足少陰之脈上股內後廉足太陽之脈外行者過髀樞中行者挾脊貫臀故此督脈之別繞臀至少陰之分與巨陽中絡者合少陰之脈並行而貫脊屬腎也與太陽起於目內眥上額交巔上入絡腦還出別下項循肩髆內挾脊抵腰中入循膂絡腎此亦督脈之別絡並足太陽經上頭下項挾脊抵腰復絡於腎其直行者自尻上脊下頭由鼻而至人中也其男子循莖下至篡與女子等其少腹直上者貫臍中央上貫心入喉上頤還唇上系兩目之下中央此自小腹直上者皆任脈之道而此列為督脈啓玄子引古經云任脈循背謂之督脈自少腹直上者謂之任脈亦謂之督脈此生病從少腹上衝心而痛不得前後為沖疝此督脈自臍上貫心故為病如此名為沖疝實兼沖任而為病也其女子不孕癃痔遺溺嗌乾女子諸症雖由督脈所生實亦任沖之病王氏曰任脈者女子得之以任養也衝脈者以其氣上衝也督脈者督領諸脈之海也三脈皆由陰中而上故其病如此督脈生病治督脈治在骨上甚者在齊下營骨上謂曲骨上毛際中齊下營謂臍下一寸陰交穴也皆任脈之穴而治督脈之病正以脈雖有三論治但言督脈而不云任沖所用之穴亦以任為督可見三脈同體督即任沖之綱領任沖即督之別名耳靈樞脈度篇曰蹺脈者少陰之別起於然骨之後蹺脈有二曰陰蹺曰陽蹺少陰之別腎經之別絡也然谷之後照海也此但言陰蹺未及陽蹺惟繆刺論曰邪客於足陽蹺之脈刺外踝之下半寸所蓋陽蹺為太陽之別故難經曰陽蹺脈起於跟中循外踝上行入風池陰蹺者亦起於跟中循內踝上行至咽喉交貫衝脈故陰蹺為足少陰之別起於照海陽蹺為足太陽之別起於申脈庶得其詳也上內踝之上直上循陰股入陰上循胸裡入缺盆上出人迎之前入頄屬目內眥合於太陽陽蹺而上行氣並相還則為濡目氣不榮則目不合自內踝直上入陰循胸皆並足少陰上行也然足少陰之直者循喉嚨而挾舌本此則入缺盆上出人迎之前入頄屬目內眥以合於足太陽之陽蹺是蹺脈有陰陽之異也陰蹺陽蹺之氣並行回還而濡潤於目若蹺氣不榮則目不能合按陰維脈起於諸陰之交其脈發於足少陰築賓穴為陰維之郤在內踝上五寸腨肉分中上循股內廉上行入少腹會足太陰厥陰少陰陽明於府舍上會足太陰於大橫腹哀循脅肋會足厥陰於期門上胸膈挾咽與任脈會於天突廉泉上至前頂而終陽維脈起於諸陽之會其脈發於足太陽金門穴在足外踝下一寸五分上外踝七寸會足少陽於陽交為陽維之郤循膝外廉上髀厭抵小腹側會足少陽於居髎循脅肋斜上肘上會手陽明足太陽於臂臑過肩前與手少陽會於臑會天髎卻會手足少陽足陽明於肩井入肩後會手太陽陽蹺於臑俞上循耳後會手足少陽於風池上腦空承靈正營目窗臨泣下額與手足少陽陽明五脈會於陽白循頭入耳上至本神而止帶脈起於季脅足厥陰之章門穴同足少陽循帶脈圍身一周如束帶然又與足少陽會於五樞維道二蹺為病苦癲癇寒熱皮膚淫痹少腹痛裡急腰及髖髎下相連陰中痛男子陰疝女子漏下二維為病陰陽不能相維則悵然失志溶溶不能自收持陽維為病苦寒熱陰維為病苦心痛陽維主表陰維主裡帶脈為病腹滿腰溶溶如坐水中婦人小腹痛裡急後重瘛瘲月事不調赤白帶下李瀕湖云奇經八脈者陰維也陰維也陰蹺也陽蹺也沖也任也督也帶也陽維起於諸陽之會由外踝而上行於衛分陰維起於諸陰之交由內踝而上行於營分所以為一身之綱維也陽蹺起於跟中維外踝上行於身之左右陰蹺起於跟中循內踝上行於身之左右所以使機關之蹺捷也督脈起於會陰循背而行於身之後為陽脈之總督故曰陽脈之海任脈起於會陰循腹而行於身之前為陰脈之承任故曰陰脈之海衝脈起於會陰夾臍而行直衝於上為諸脈之衝要故曰十二經之海帶脈則橫圍於腰狀如束帶所以總約諸脈者也是故陽維主一身之表陰維主一身之裡以乾坤言也陽蹺主一身左右之陽陰蹺主一身左右之陰以東西言也督主身後之陽任沖主身前之陰以南北言也帶脈橫束諸脈以六合言也是故醫而知乎八脈則十二經十五絡之大旨得矣愚按直行曰經旁支曰絡經有十二手之三陰三陽足之三陰三陽也絡有十五者十二經各有一別絡而脾又有一大絡並任督二絡為十五絡也合計二十七氣如泉之流不捨晝夜陰脈營於五臟陽脈營於六腑終而復始如環無端其流溢之氣入於奇經轉相灌溉八脈無表裡配合不成偶故曰奇也正經猶溝渠奇經猶湖澤譬之雨降溝盈溢於湖澤也臟腑者經絡之本根經絡者臟腑之枝葉諳於經絡則陰陽表裡氣血虛實瞭然於心目初學者必先於是神良者亦不外於是第粗工昧之詆其迂遠不切智士察之謂其應變無窮耳二治則陰陽應象大論曰陰陽者天地之道也萬物之綱紀變化之父母生殺之本始神明之府也治病必求其本此明天地萬物變化生殺總不出於陰陽察乎此者可以當神明矣故治病者萬緒紛然必求於本或本於陰或本於陽陰陽既得病祟焉逃芩連姜附儘可回春參朮硝黃並能起死此之未辨畏攻畏補憂熱憂寒兩岐必至於誤生廣絡遺譏於聖哲本顧可弗求乎哉至真要大論曰謹守病機各司其屬有者求之無者求之盛者責之虛者責之必先五勝疏其血氣令其調達而致和平此言病狀繁多各宜細察然總不外於虛實也謹守者防其變動也病而曰機者狀其所因之不齊而治之不可不圓活也屬者有五臟之異六腑之異七情之異六氣之異貴賤之異老少之異稟畀有虛實之異受病有標本之異風氣有五方之異運氣有勝復之異情性有緩急之異有嘗貴後賤之脫營嘗富後貧之氣離守各審其所屬而司其治也有者求之二句言一遇病症便當審其所屬之有無也盛者責之二句是一章之大綱於各屬有無之間分別虛實而處治也然至虛似實大實似虛此又不可不詳為之辨也必先五勝者如木欲實金當平之之類是也疏其血氣非專以攻伐為事或補之而血氣方行或溫之而血氣方和或清之而血氣方治或通之而血氣方調正須隨機應變不得執一定之法以應無窮之變也此治虛實之大法一部內經之關要也君一臣二奇之制也君二臣四偶之制也君二臣三奇之制也君二臣六偶之制也君者品味少而分兩多臣者品味多而分兩少奇制從陽偶制從陰故曰近者奇之遠者偶之汗者不以偶下者不以奇病在上者為近屬陽故用奇方取其輕而緩也病在下者為遠屬陰故用偶方取其重而急也汗者不以偶陰沉不能達表也下者不以奇陽升不能降下也補上治上制以緩補下治下制以急急則氣味厚緩則氣味薄適其至所此之謂也上藥宜緩欲其曲留上部下藥宜急欲其直達下焦欲急者須氣味之厚欲緩者須氣味之薄緩急得宜厚薄合度則適其病至之所何患劑之弗靈乎病所遠而中道氣味之者食而過之無越其制度也病之所在遠而藥則必由於胃用之無法則未達病所則中道先受其氣味矣當於食為度而使遠近適宜是過之也過猶達也欲其近者藥在食後則食載藥而留止於上欲其遠者藥在食前則食墜藥而疾走於下服藥有疾徐根梢有升降氣味有緩急藥劑有湯丸膏散各須合法無越其度也是故平氣之道近而奇偶制小其服也遠而奇偶制大其服也大則數少小則數多多則九之少則二之近病遠病各有陰陽表裡之分故遠方近方各有奇偶相兼之法或方奇而分兩偶或方偶而分兩奇此奇偶互用也近而奇偶制小其服小則數多而盡於九蓋數多則分兩輕性力緩而僅及近病也遠而奇偶制大其服大則數少而止於二蓋數少則分兩重性力專而直達遠病也是皆奇偶互用法之變也奇之不去則偶之是謂重方偶之不去則反佐以取之所謂寒熱溫涼反從其病也此變通之法也始用藥奇而病不去變而為偶奇偶迭用是曰重方重者復也若偶之而又不去則當求其微甚真假反佐以取之反佐者順其性也如以熱治寒而寒拒熱則反佐以寒而入之以寒治熱而熱格寒則反佐以熱而入之又如寒藥熱服熱藥冷服皆變通之妙用也王太僕曰熱與寒背寒與熱違微小之熱為寒所折微小之冷為熱所消大寒大熱必能與違性者爭與異氣者格是以聖人反其佐以同其氣令聲應氣求也辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽六者或收或散或緩或急或燥或潤或軟或堅以所利而行之調其氣使其平也湧吐也泄瀉也滲泄利小便也辛主散主潤甘主緩酸主收主急苦主燥主堅咸主軟淡主滲泄各因其利而行之氣可平矣寒者熱之熱者寒之微者逆之甚者從之義見上堅者削之客者除之勞者溫之結者散之留者攻之燥者濡之急者緩之散者收之損者益之逸者行之驚者平之上之下之摩之浴之薄之劫之開之發之適事為故溫之甘溫能除大熱也逸即安逸也飢飽勞逸皆能成病過於逸則氣脈凝滯故須行之上者吐也摩者按摩也薄者即薄兵城下之義適事為故猶雲中病為度適可而止毋太過以傷正毋不及以留邪也逆者正治從者反治從少從多觀其事也從少謂一從而二逆從多為二從而一逆也事即病也觀其病之輕重而為之多少也熱因寒用寒因熱用塞因塞用通因通用必伏其所主而先其所因其始則同其終則異可使破積可使潰堅可使氣和可使必已寒病宜熱然寒甚者格熱須熱藥冷服此熱因寒用也熱病宜寒然熱甚者格寒須寒藥熱服此寒因熱用也塞因塞用者如下氣虛乏中焦氣壅欲散滿則更虛其下欲補下則滿甚於中治不知本而先攻其滿藥入或減藥過依然氣必更虛病必轉甚不知少服則壅滯多服則宣通峻補其下則下自實中滿自除矣通因通用者或挾熱而利或凝寒而泄寒者以熱下之熱者以寒下之伏其所主利病之本也先其所因者求病之由也其始則同言正治也其終則異言反治也明於反治何病不愈諸寒之而熱者取之陰熱之而寒者取之陽所謂求其屬也用寒藥治熱病而熱反增非火有餘乃陰不足也陰不足則火亢故當取之陰但補陰則陽自退耳用熱藥治寒症而寒反增非寒有餘乃陽不足也陽不足則陰寒故當取之陽但補水中之火則寒自消耳求其屬者求於本也一水一火皆於腎中求之故王太僕曰益火之源以消陰翳壯水之主以制陽光六味八味二丸是也夫五味入胃各歸所喜攻酸先入肝苦先入心甘先入脾辛先入肺咸先入腎久而增氣物化之常也氣增而久夭之由也增氣者助其氣也如黃連之苦本入心瀉火多服黃連反助心火故五味各歸久而增氣氣增必夭折可不慎歟陰陽應象大論曰因其輕而揚之因其重而減之因其衰而彰之輕者在表宜揚而散之重者在內宜減而瀉之衰者不補則幽潛沉冤矣補則再生故曰彰形不足者溫之以氣精不足者補之以味此彰之之法也陽氣衰微則形不足溫之以氣則形漸復也陰髓枯竭則精不足補之以味則精漸旺也其高者因而越之高者病在上焦越者吐也越於高者之上也其下者引而竭之下者病在下焦竭者下也引其氣液就下也通利二便皆是也或云引者蜜導膽導之類竭者承氣抵當之類中滿者瀉之於內中滿非氣虛中滿也如脹滿而有水有積傷寒而結胸便閉是也內字與中字照應其有邪者漬形以為汗漬浸也如布桃枝以取汗或煎湯液以熏蒸或表清邪重藥不能汗或冬月天寒發散無功非漬形之法不能汗也其在皮者汗而發之邪在皮則淺矣但分經汗之可也其慓悍者按而收之慓者急也悍者猛也怒氣傷肝之症也按者制伏酸收如芍藥之類是也其實者散而瀉之陰實者以丁薑桂附散其寒陽實者以芩連梔柏瀉其火審其陰陽以別柔剛審病之陰陽施藥之柔剛陽病治陰陰病治陽陽勝者陰傷治其陰者補水之主也陰勝者陽傷治其陽者補水中之火也定其血氣各守其鄉或血或氣用治攸分各不可紊也血實宜決之導之下流如決江河也氣虛宜掣引之提其上升如手掣物也五常政大論曰病有久新方有大小有毒無毒固宜常制矣病久者宜大劑病新者宜小劑無毒者宜多用有毒者宜少用大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九藥不及則病不痊藥太過則正乃傷大毒治病十去其六便當止矣毒輕則可任無毒則可久任也穀肉果菜食養盡之無使過之傷其正也病雖去而有未盡去者當以飲食養正而餘邪自盡若藥餌太過便傷正氣必先歲氣毋伐天和五運有紀六氣有序四時有令陰陽有節皆歲氣也人氣應之以生長收藏此天和也於此未明則犯歲氣伐天和矣六元正紀大論黃帝問曰婦人重身毒之何如岐伯曰有故無殞亦無殞也有孕曰重身毒之用毒藥也故者如下文大積大聚之故有是故而用是藥所謂有病則病當之故孕婦不殞胎亦不殞也帝曰願聞其故何謂也岐伯曰大積大聚其可犯也衰其大半而止大積大聚非毒藥不能攻然但宜衰其大半便當禁止所謂大毒治病十去其六者是也愚按論治之則載由經籍圓通之用妙出吾心如必按圖索驥則後先易轍未有不出者矣子輿氏曰梓匠輪輿能與人以規矩不能使人巧故夫揆度陰陽奇恆五中決以明堂審於終始其亦巧於規矩者乎三病能至真要大論曰諸風掉眩皆屬於肝諸風者風病不一也掉搖動也眩昏花也風木善動肝家之症也掉眩雖同而虛實有別不可不察焉諸寒收引皆屬於腎收斂束也引牽急也筋脈攣急本是肝症而屬於腎者一則以腎肝之症同一治一則腎主寒水之化腎虛則陽氣不充營衛凝泣肢體攣踡所謂寒則筋急也諸氣膹郁皆屬於肺膹者喘急上逆郁者痞塞不通肺主氣氣有餘者本經自伏之火氣不足者則火邪乘之虛實之分極易淆誤所當精辨近世庸者概指為肺熱而攻其有餘虛虛之禍良可嗟悼諸濕腫滿皆屬於脾脾司濕化又主肌肉內受濕淫肌體腫滿故屬於脾土氣太過則濕邪盛行其病驟至法當分疏土氣不及則木乘水侮其病漸成法當培補二者易治比於操刃諸熱瞀瘛皆屬於火昏悶曰瞀抽掣曰瘛邪熱傷神則瞀亢陽傷血則瘛雖皆屬火亦有虛實之分丹溪曰實火可瀉岑連之屬虛火可補參耆之屬仁人之言哉諸痛癢瘡皆屬於心熱甚則瘡痛熱微則瘡癢心主熱火之化故痛癢諸瘡皆屬於心也諸厥固泄皆屬於下厥者自下而逆上也陰衰於下則為熱厥陽衰於下則為寒厥固者二便不通也陽虛則無氣而清濁不化寒也火盛則水衰而精液乾枯熱也泄者二便不固也命門火衰則陽虛失禁寒也腎宮水衰則火迫注泄熱也腎開竅於二陰腎主二便居下故也諸痿喘嘔皆屬於上痿廢應屬下部而屬於上者何也肺熱葉焦發為痿躄氣急曰喘病在肺也有聲無物曰嘔肺胃司之總屬在上之症諸禁鼓栗如喪神守皆屬於火禁即噤也寒厥咬牙曰噤鼓鼓頷也栗戰栗也寒戰而神不自持如喪神守皆火也心火亢極反兼勝己之化此火實也陽虛陰盛氣不衛外而寒戰者此火虛也諸痙項強皆屬於濕痙者風濕而屈伸不利也項屬足太陽寒水水即濕也故皆屬於濕諸逆衝上皆屬於火喘咳嘔吐氣滿逆急皆沖逆之症火性炎上故皆屬於火諸脹腹大皆屬於熱熱氣內淫變為煩滿故曰皆屬於熱近世執此一句因而誤人不可勝數獨不聞經曰歲水太過腹大脛腫歲火不及脅滿腹大流衍之紀病脹水鬱之發善脹太陽之勝腹滿陽明之復腹脹又曰適寒涼者脹又曰藏寒生滿病又曰胃中寒則脹滿此九者皆言寒脹也故東垣曰大抵寒脹多熱脹少良有本矣諸躁狂越皆屬於火躁者煩躁也狂者妄亂也越者如登高而歌之類火入於肺則煩火入於腎則躁又有陰盛發躁成無己曰陰躁欲坐井中但欲飲水不得入口東垣曰陰躁欲坐井中陽已先亡醫猶不悟重以寒藥投之其死何疑故曰內熱而躁者有邪之熱也屬火外熱而躁者無根之火也屬寒經之論狂屢見屬虛寒者凡四條是狂亦有寒熱之辨矣諸暴強直皆屬於風暴猝也強者筋強直者體直而不能屈伸也肝主筋其化風故曰屬風非天外入風也內風多燥若用風劑則益燥故有治風先治血血行風自滅之說也輕與疏風則益燥且腠理開張反招風矣諸病有聲鼓之如鼓皆屬於熱有聲謂腸鳴也鼓之如鼓謂腹脹也皆陽氣逆壅故曰屬熱二症多有屬於寒者盡信不如無書其是之謂耶諸病胕腫疼酸驚駭皆屬於火胕腫者浮腫也疼酸者火在經也驚駭者火在臟也然胕腫痠疼屬於寒濕者不少驚駭不寧屬於不足者常多也諸轉反戾水液渾濁皆屬於火轉筋攣踡燥熱所致小便渾濁清化不及故皆屬熱然而寒則筋急喻如冬月嚴寒則角弓增徑心腎不足多有便濁經云中氣不足溲便為之變讀者蓋通之可耳諸病水液澄徹清冷皆屬於寒澄徹清冷者寒水之本體故皆屬寒諸嘔吐酸暴注下迫皆屬於熱嘔逆者火炎之象吐酸者肝木之實暴注者火性疾速下迫者火能燥物此特道其常耳虛寒之變數症常作不可不知也按經言十九條道其常也余每舉其反者盡其變也王太僕深明病機之變其所注疏真內經畫龍點睛手也啓玄曰如大寒而甚熱之不熱是無火也當助其心又如大熱而甚寒之不寒是無水也熱動復止倏忽往來時動時止是無水也當助其腎內格嘔逆食不得入是有火也病嘔而吐食入反出是無火也暴速注下食不及化是無水也溏泄而久止發無恆是無水也故心盛則熱腎盛則寒腎虛則寒動於中心虛則熱收於內又熱不得寒是無水也寒不得熱是無火也夫寒之不寒責之無水熱之不熱責其無火熱之不久責心之虛寒之不久責腎之少方有治熱以寒寒之而火食不入攻寒以熱熱之而昏躁以生此為氣不疏通壅而為是也余以太僕此語為岐黃傳神常自誦憶並勉同志生氣通天論曰因於寒欲如運樞起居如驚神氣乃浮陽氣不固四時之邪乃能幹之經曰冬三月此謂閉藏水冰地坼無擾乎陽又曰冬日在骨蟄蟲周密君子居室皆言冬令宜閉藏也因者病因也因寒而動者內而欲心妄動如運樞之不停外而起居不節如驚氣之震動則與天令相違神氣不能內斂皆浮越於外矣因於暑汗煩則喘喝靜則多言此言動而得之為中熱之候也炎蒸勞役病屬於陽故多汗而煩氣高喘喝即感之輕而靜者亦精神內亂言語無倫也體若燔炭汗出而散此言靜而得之為中暑之候也納涼飲冷病屬於陰熱氣抑遏體如燔炭必得發汗而陰鬱之氣始散也香薷一味為夏月發汗之要藥其性溫熱止宜於中暑之人若中熱者誤服之反成大害世所未知因於濕首如裹濕熱不攘大筋軟短小筋弛長軟短為拘弛長為痿土旺四季之末發無常期首如裹者濕傷則頭面壅重也濕久成熱須藥以攘奪之苟為不奪則熱傷陰血筋無以榮大筋拘而不伸小筋弛而無力矣因於氣為腫四維相代陽氣乃竭肺金主氣病因於氣者秋令之邪也腫者氣化失宜乃為腫脹也四維者四肢也相代者言足腫不能行手代之以扶倚也氣不能治終歸於竭矣陽氣者煩勞則張精絶闢積於夏使人煎厥陽春主生髮之氣此言春令之邪也氣方生而煩勞太過則氣張於外精絶於內春令邪辟之氣積久不散至夏未痊則火旺而真陰如煎火炎而虛氣逆上故曰煎厥按脈解篇曰肝氣失治善怒者名曰煎厥則此節指春令無疑舊疏從未及之豈非千慮一得大怒則形氣絶而血菀菀茂也結也於上使人薄厥怒氣傷肝肝為血海怒則氣上氣逆則絶所以血菀上焦相迫曰薄氣逆曰厥氣血俱亂故為薄厥蓋積於上者勢必厥而吐也薄厥者氣血之多而盛者也有傷於筋縱其若不容怒傷而至於血厥則筋無以榮緩縱不收若不能容矣汗出偏沮使人偏枯偏者或左或右止出半邊也沮者言此既偏出彼即阻滯矣久則衛氣不固營氣失守當為偏枯即半身不遂也汗出見濕乃生痤音鋤痱音沸汗出則玄府開張若涼水浴之即見濕矣留於膚腠甚者為痤微者為痱痤小癤也痱暑疹也高粱之變足生大疔受如持虛高粱即肥甘也變病也足能也厚味不節蓄為灼熱能生大疔日積月纍感發最易如持虛之器以受物也勞汗當風寒薄為皶音渣郁乃痤形勞汗出坐臥當風寒氣薄之液凝為皶即粉刺也若鬱而稍重乃若小癤其名曰痤開闔不得寒氣從之乃生大僂夏則腠理開而發泄冬則腠理闔而閉藏與時偕行也若當開不開當閉不閉不得其宜為寒所襲留於筋絡之間軟急不舒形為俯僂矣陷脈為瘻留連肉腠陷脈者寒氣自筋絡而陷入脈中也瘻鼠瘻之屬邪久不散則漸深矣俞氣化薄傳為善畏及為驚駭寒氣漸深自脈而流於經俞侵及臟腑故為恐畏驚駭也營氣不從逆於肉理乃生癰腫營行脈中邪氣陷脈則營氣不從故逆於肉而癰腫生焉魄汗未盡形弱而氣爍穴俞已閉發為風瘧肺主皮毛汗之竅也肺實藏魄故名魄汗汗出未透則熱鬱於內形氣俱爍俞穴以閉留止之邪必為風瘧矣春傷於風邪氣留連乃為洞泄春傷於風則肝木侮土故為洞泄夏傷於暑秋為痎瘧夏傷於暑伏而不發秋氣收束寒鬱為熱故寒熱交爭而成痎瘧痎者瘧之通稱非有別義秋傷於濕上逆而咳發為痿厥土旺於四季之末秋末亦可傷濕秋氣通於肺濕鬱成熱上乘肺金氣逆而咳曰上逆者濕從下受故也冬傷於寒春必溫病冬傷於寒寒毒藏於陰分至春始發名為溫病以時令得名也春不發而至於夏即名熱病矣味過於酸肝氣以津脾氣乃絶曲直作酸肝之味也過於食酸久而增氣木乘土位脾氣乃絶味過於咸大骨氣勞短肌心氣抑咸為腎味過食則傷腎腎主骨故大骨氣勞咸走血血傷故肌肉短縮咸從水化水勝則火囚故心氣抑味過於甘心氣喘滿色黑腎氣不衡甘歸土味過食則緩滯上焦故心氣喘滿甘從土化土勝則水病故黑色見而腎氣不衡矣衡平也味過於苦脾氣不濡胃氣乃厚苦味太過則心傷而脾失其養且苦者性燥故不濡也五味論曰苦入於胃穀氣不能勝苦苦入下脘三焦之道閉而不通故變嘔可見苦寒損中令脾之正氣不濡胃之邪氣乃厚厚者脹滿之類也味過於辛筋脈沮弛精神乃央味過於辛則肺氣乘肝肝主筋故筋脈沮弛辛味多散則精耗神傷故曰央央當作殃陰陽別論曰二陽之病發心脾有不得隱曲女子不月陽明為二陽胃傷而心脾受病者何也脾與胃為夫妻夫傷則妻亦不利也心與胃為子母子傷則母亦不免焉不得隱曲陽事病也胃為水穀氣血之海化營衛而潤宗筋厥論曰前陰者宗筋之所聚太陰陽明之所合也痿論曰陰陽總宗筋之會而陽明為之長故胃病則陽事衰也女子不月者心主血脾統血胃為血氣之海三經病而血閉矣其傳為風消其傳為息賁者死不治胃家受病久而傳變則肝木勝土風淫而肌體消削胃病則肺失所養故氣息奔急隱曲害者精傷精傷則火亢乘金元本敗而賊邪興死不治矣三陽為病發寒熱下為癰腫及為痿厥腨㾓其傳為索澤其傳為頽疝太陽為三陽屬表故發寒熱與癰腫足太陽之脈從頭下背貫臀入膕循腨抵足故足膝無力而痿逆冷而厥足肚痠疼而為腨㾓表有寒熱則潤澤之氣必皆消索頽疝者小腹控引睪丸而痛也一陽發病少氣善咳善泄其傳為心掣其傳為隔少陽為一陽膽與三焦也膽屬木三焦屬火壯火食氣相火刑金故少氣善咳木旺則侮土故善泄三焦火動則心掣而不寧膽氣乘脾則隔塞而不利二陽一陰發病主驚駭背痛善噫善缺名曰風厥二陽胃與大腸也一陰肝與心主也肝胃二經皆主驚駭經曰東方通於肝其病發驚駭又曰足陽明病聞木音則惕然而驚是也手陽明之筋皆挾脊故背痛噫噯氣也其主在心經曰上走心為噫者陰盛而上走於陽明陽明絡屬心也缺雖主於腎而經云足陽明病為數缺則胃亦病缺也肝主風心包主火風熱相搏故病風厥二陰一陽發病善脹心滿善氣二陰心與腎也一陽膽與三焦也膽乘心則脹腎乘心則滿三焦病則上下不通故善氣三陽三陰發病為偏枯痿易四肢不舉三陽膀胱小腸也三陰脾肺也膀胱之脈自頭背下行兩足小腸之脈自兩手上行肩胛且脾主四肢肺主氣四經俱病當為偏枯等症易變易也強者變而為痿也所謂生陽死陰者肝之心謂之生陽得陽則生失陽則死故曰生陽死陰也自肝傳心以木生火得之生氣是謂生陽不過四日而愈心之肺謂之死陰心傳肺者為火剋金故曰死陰不過三日死肺之腎謂之重陰肺金腎水雖曰子母相傳而金水俱病則重陰而陽絶矣腎之脾謂之闢陰死不治土本制水而水反侮脾是謂闢陰闢者放僻也結陽者腫四肢陽六陽也四肢為諸陽之本故云結陰者便血一升再結二升三結三升陰六陰也陰主血邪結陰分故當便血病淺者一升即愈若不愈而再結邪甚於前矣故便血二升更不愈為尤甚故便血三升陰陽結斜多陰少陽曰石水少腹腫斜當作邪六陰六陽諸經皆能結聚水邪若多在陰經少在陽經病生石水沉堅在下症則少腹腫也二陽結謂之消胃與大腸經也陽邪結於腸胃則成三消之症多飲而渴不止為上消多食而飢不止為中消多溲而膏濁不止為下消三陽結謂之隔膀胱小腸二經也邪結膀胱則氣化不行津液阻絶小腸居大腸之上胃之下盛水穀而分清濁者也邪乘之則水液不前糟粕不後二者皆痞隔之象也三陰結謂之水脾肺二經也脾土製水土受邪則水反侮之肺金生水金氣病則水不能輸故寒結三陰而水脹之症作矣一陰一陽結謂之喉痹一陰肝與心主也一陽膽與三焦也肝膽屬木心主三焦屬火四經皆亢上其脈並絡於喉陽邪內結痹症乃生痹者閉也靈樞經脈篇曰肺手太陰也是動則病肺脹滿膨膨而喘咳動者變也變常而病也肺脈起中焦循胃上膈屬肺故病如此缺盆中痛甚則交兩手而瞀此謂臂厥缺盆近肺肺病則痛瞀麻木也肺脈出腋下行肘臂故臂厥是主肺所生病者咳上氣喘渴煩心胸滿臑臂內前廉痛厥掌中熱喘者氣上而聲粗息急也渴者金令燥也太陰之別直入掌中故為痛厥掌熱氣盛有餘則肩背痛風寒汗出中風小便數而缺肺之筋結於肩背故氣盛則痛肺主皮毛風寒在表故汗出中風母病傳子故腎病而小便數且缺也氣虛則肩背痛寒少氣不足以息溺色變肩背處上焦為陽分氣虛則陽病故為痛為寒為少氣金衰則水涸故溺色變為黃赤大腸手陽明也是動則病齒痛頸腫陽明支脈從缺盆上頸貫頰入下齒中是主津液所生病者大腸或泄或閉皆津液病也目黃口乾鼽衄喉痹肩前臑痛大指次指痛不用皆本經之脈所過故如此氣有餘則當脈所過者熱腫虛則寒栗不復不復不易溫也胃足陽明也是動則病灑灑振寒善伸數缺顏黑振寒者肝風勝也伸者胃之郁也缺與顏黑腎象也土虛水侮故腎之象見病至則惡人與火聞木音則惕然而驚心欲動獨閉戶塞牖而處甚則欲上高而歌棄衣而走陽明熱甚則惡人與火驚聞木音者土畏木也欲閉戶者火動則畏光明也上高而歌者火性上越且陽盛則四肢實也棄衣而走者中外皆熱也賁響腹脹是為骭厥賁響者腹如雷鳴也骭足脛也陽明之脈自膝下脛故脛骭厥逆是主血所生病者陽明為受谷而多血之經狂瘧溫淫汗出鼽衄口喎唇疹頸腫喉痹熱甚則狂風甚則瘧且汗出衄血口喎唇瘡等症皆本經經脈之所過也大腹水腫膝臏腫痛循膺乳氣街股伏兔骭外廉足跗上皆痛中指不用陽明脈從缺盆下乳挾臍腹前陰由股下足以入中指故病狀如上氣盛則身以前皆熱其有餘於胃則消穀善飢溺色黃此陽明實熱在經在臟之辨也氣不足則身以前寒栗胃中寒則脹滿此陽明虛寒在經在臟之辨也脾足太陰也是動則病舌本強食則嘔脈連舌本故強脾虛不運故嘔胃脘痛腹脹善噫脾脈入腹絡胃故為痛為脹陰盛而上走陽明故氣滯為噫得後與氣則快然如衰後大便也氣轉失氣也氣通故快身體皆重脾主肌肉脾主濕濕傷則體重是主脾所生病者舌本痛體不能動搖食不下煩心心下急痛溏瘕泄水閉黃疸不能臥強立股膝內腫厥足大指不用支者上膈注心故為煩心與痛溏者水泄也瘕者痢疾也水閉者土病不能治水也水閉則濕熱壅而為疸為不臥脾脈起於足拇以上膝股腫與厥之所由生也心手少陰也是動則病嗌乾心痛渴而欲飲是為臂厥是主心所生病者支者從心系上咽故嗌乾心痛火炎故渴脈循臂內故為臂厥目黃脅痛臑臂內後廉痛厥掌中熱痛脈系目系故目黃出腋下故脅痛循臂入掌故有熱痛等症小腸手太陽也是動則病嗌痛頷腫不可以顧肩似拔臑似折經脈循咽下膈支者循頸上頰循臑繞肩故為病如上是主液所生病者小腸分水穀故主液耳聾目黃頰腫頸頷肩臑肘臂外後廉痛皆經脈所及也膀胱足太陽也是動則病沖頭痛本經脈上額入腦故邪氣衝而頭痛目似脫項如拔脊痛腰似折髀不可以曲膕如結踹如裂是為踝厥皆經脈所及之病也是主筋所生病者周身之筋惟足太陽至多至大故凡筋症皆足太陽水虧也痔瘧狂癲疾脈入肛故為痔經屬表故為瘧邪入太陽故為狂癲頭囪項痛目黃淚出鼽衄項背腰尻膕踹腳皆痛小指不用皆本經所過之症腎足少陰也是動則病飢不欲食水中有火為脾之母真火不生土則脾虛雖飢不能食矣面如漆柴咳唾則有血喝喝而喘腎之本色見者精衰故也吐血與喘水虛而火刑金也坐而欲起目䀮䀮如無所見坐而欲起陰虛則不能靜也腎虛則瞳神昏眩故無所見也心如懸若飢狀相火不寧君主亦不自安也如懸若飢心腎不交也氣不足則善恐心惕惕如人將捕之是為骨厥腎志恐故如捕也腎主骨故為骨厥是主腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛經脈之病也黃疸腸澼黃疸腸澼咎由濕熱水虛者多有之脊股內後廉痛痿厥嗜臥足下熱而痛皆經脈所及之病精竭者神疲故嗜臥身半以下腎所主也故足痛心主手厥陰心包絡也是動則病手心熱臂肘攣急腋腫甚則胸脅支滿心中憺憺大動皆經脈之所及面赤目黃喜笑不休心之華在面在聲為笑故見症如此是主脈所生病者心主血脈煩心心痛掌中熱經脈病也三焦手少陽也是動則病耳聾渾渾焞焞嗌腫喉痹經脈所過之病是主氣所生病者三焦為水府水病必由於氣汗出目鋭眥痛頰痛耳後肩臑肘臂外皆痛小指次指不用三焦出氣以溫肌肉充皮膚故為汗出諸病皆經脈所過也膽足少陽也是動則病口苦善太息膽病汁溢故口苦膽鬱則太息心脅痛不能轉側別脈貫心循脅甚則面微有塵體無膏澤別脈散於面膽受金殘則燥症見矣足外反熱是為陽厥本經脈出外踝之前故足外反熱熱上逆名陽厥是主骨所生病者膽而主骨病者乙癸同元也頭痛頷痛目鋭眥痛缺盆中腫痛腋下腫馬刀俠癭馬刀瘰癧也俠癭俠頸之瘤也汗出振寒瘧少陽居三陽之中半表半裡故陽勝則汗出風勝則振寒而為瘧也胸脅肋髀膝外至脛絶骨外踝前及諸節皆痛小指次指不用皆經脈所過之病肝足厥陰也是動則病腰痛不可以俯仰支別者與太陰少陽之脈同結腰踝故腰痛丈夫㿉疝婦人少腹腫脈繞陰器故控睪而痛為疝症婦人少腹腫亦疝也甚則嗌乾面塵脫色脈循喉上額支者從目系下頰故其病如此是肝所生病者胸滿嘔逆飧泄狐疝遺溺閉癃上行者挾胃貫膈下行者過陰器故為是諸病通評虛實論曰邪氣盛則實精氣奪則虛此二語為醫宗之綱領萬世之準繩其言若淺而易明其旨實深而難究夫邪氣者風寒暑濕燥火精氣即正氣乃穀氣所化之精微盛則實者邪氣方張名為實症三候有力名為實脈實者瀉之重則汗吐下輕則清火降氣是也奪則虛者亡精失血用力勞神名為內奪汗之下之吐之清之名為外奪氣怯神疲名為虛症三候無力名為虛脈虛者補之輕則溫補重則熱補是也無奈尚子和丹溪之說者輒曰瀉實尚東垣立齊之說者輒曰補虛各成偏執鮮獲圓通此皆賴病合法耳豈所為法治病乎精於法者止辨虛實二字而已其中大實大虛小實小虛似實似虛更貴精詳大虛者補之宜峻宜溫緩則無功也大實者攻之宜急宜猛遲則生變也小虛者七分補而三分攻開其一面也小實者七分攻而三分補防其不測也至於似虛似實舉世淆訛故曰至虛有盛候反瀉含冤大實有羸狀誤補益疾辨之不可不精治之不可不審也或攻邪而正始復或養正而邪自除千萬法門只圖全其正氣耳嗟乎實而誤補固必增邪尚可解救其禍猶小虛而誤攻真氣立盡莫可挽回其禍至大生死關頭良非渺小司命者其慎之哉調經論帝曰陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒不知其所由然也岐伯曰陽受氣於上焦以溫皮膚分肉之間令寒氣在外則上焦不通上焦不通則寒氣獨留於外故寒栗陽氣者衛外而為固者也陽虛則無氣以溫皮膚命曰無火上焦所以不通獨有寒氣而已矣帝曰陰虛生內熱奈何岐伯曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中故內熱陰氣營於內者也有所勞倦則脾胃受傷脾主肌肉亦主運化穀氣以生真氣土衰則形肉與中氣俱衰穀氣減少脾虛下陷則上焦不行下脘不通矣脾陰不足則胃熱肺居胸中熱上熏肺則內熱也此言勞倦傷脾故見症如上若色欲所傷真水耗竭火無所畏亢而刑金此之內熱尤為難療帝曰陽盛生外熱奈何岐伯曰上焦不通利則皮膚緻密腠理閉塞玄府不通衛氣不得泄越故外熱陽主在上又主在表故陽亢則上壅而表熱此傷寒之候也帝曰陰盛生內寒奈何岐伯曰厥氣上逆寒氣積於胸中而不瀉不瀉則溫氣去寒獨留則血凝泣凝則脈不通其脈盛大以澀故中寒寒氣入臟則陽氣去矣寒獨留者如冬令嚴寒萬物閉蟄之象故脈不通而澀此內傷之候也調經篇云因飲食勞倦損傷脾胃始受熱中末傳寒中始受者病初起也末傳者久而不愈也初起病時元氣未虛邪氣方實實者多熱及病之久邪氣日退正氣日虛虛者多寒古人立法於始受熱中者實則瀉其子夫肺金為脾土之子而實主氣氣有餘便是火故凡破氣清火之劑皆所以瀉其子也於末傳寒中者虛則補其母夫少火為脾土之母而實主運行三焦熟腐五穀故凡溫中益火之劑皆所以補其母也每見近世不辨虛實一遇脾病如脹滿如停滯如作痛如發熱之類概以清火疏氣之藥投之虛虛之禍可勝數哉玉機真藏論曰脈盛皮熱腹脹前後不通悶瞀此謂五實實者邪氣實也心受邪則脈盛肺受邪則皮熱脾受邪則腹脹腎受邪則前後不通肝受邪則悶瞀肝脈貫膈氣逆上也脈細皮寒氣少泄利前後飲食不入此謂五虛虛者正氣虛也心虛則脈細肺虛則皮寒肝虛則氣少腎虛則泄利前後脾虛則飲食不入五實五虛皆死候也漿粥入胃泄注止則虛者活治虛之法先扶根本漿粥入胃則脾土將復泄注既止則腎水漸固雖犯虛死自可回生也身汗得後利則實者活治實之法汗下為要身既得汗則表邪解後既得利則里邪去雖犯實死之條邪退則活矣舉痛論帝曰余知百病生於氣也怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收熱則氣泄驚則氣亂勞則氣耗思則氣結九氣不同何病之生岐伯曰怒則氣逆甚則嘔血及飧泄故氣上矣肝木主春升之令怒傷之如雷奮九天故氣逆也血屬陰主靜定而潤下肝逆而上且為血海則陰血不得安其靜定之常故嘔逆也木旺侮脾脾傷則不化谷而飧泄是以氣逆而上也喜則氣和志達榮衛通利故氣緩矣和達通利若不為病矣不知大喜則氣散而不收緩慢不能攝持故本神篇曰喜樂者神憚散而不藏是也悲則心系急肺布葉舉而上焦不通榮衛不散熱氣在中故氣消矣悲生於心故心系急並於肺則肺葉舉不通不散則氣壅而為火火主刑金金主氣故氣消也恐則精卻卻則上焦閉閉則氣還還則下焦脹故氣不行矣恐傷腎則精卻卻者退而不能上輸也上焦閉則失上升之路還而下陷夫氣以上升為行下陷則不行矣寒則腠理閉氣不行故氣收矣寒束其外則腠理閉密陽氣不舒凍而收斂矣炅則腠理開營衛通汗大泄故氣泄矣炅者熱也如天行夏令腠理開通氣從汗散故曰氣泄驚則心無所倚神無所歸慮無所定故氣亂矣卒然驚駭則神志飄蕩動而不寧主不明則天下亂即氣亂之旨也勞則喘息汗出外內皆越故氣耗矣用力太過則疲勞而氣動內則奔於肺而為喘外則達於表而為汗故曰外內皆越而氣自耗矣思則心有所存神有所歸正氣留而不行故氣結矣思則志凝神聚氣乃留而不散故名為結風論曰風者善行而數變腠理開則灑然寒閉則熱而悶風屬陽而性動故善行數變其寒也則衰食飲其熱也則消肌肉故使人怢栗而不能食寒則胃氣不能健運故食衰熱則津液潤澤故消瘦怢栗即戰栗也風氣與陽明入胃循脈而上至目內眥其人肥則風氣不得外泄則為熱中而目黃人瘦則外泄而寒則為寒中而泣出風氣入胃胃脈上行目系人肥則腠密而邪不得泄故熱中而目黃人瘦則腠疏而邪氣易泄故寒中而泣出風氣與太陽俱入行諸脈俞散於分肉之間與衛氣相干其道不利故使肌肉憤䐜而有瘍衛氣有所凝而不行故其肉有不仁也五臟六腑之俞皆附於背故風由太陽經入者邪必行諸脈俞而散於分肉分肉者衛氣之所行也衛氣晝行於陽自太陽始風與衛相薄故氣道澀而不利風氣凝結故憤䐜腫脹而為瘡瘍衛氣因風時或不行則痹而不仁也癘者有營氣熱胕其氣不清故使鼻柱壞而色敗皮膚瘍潰風寒客於脈而不去名曰癘風風寒客於血脈則營氣熱而胕潰氣者肺所治也不清則金化不行鼻與皮毛皆肺主之故鼻柱壞色敗者皮毛槁也脈要精微論曰脈風或為癘也癘者惡也風中五臟六腑之俞亦為臟腑之風各入其門戶所中則為偏風風入於臟腑之俞隨俞左右而偏中之則為偏風即偏枯也風氣循風府而上則為腦風風府督脈穴名風入系頭則為目風眼寒太陽之脈起於目內眥故目風眼寒飲酒中風則為漏風酒性溫散善開玄府故醉後易於中風漏者言汗漏而風客也入房汗出中風則為內風內耗其精外開腠理風乘虛犯名為內風新沐中風則為首風久風入中則為腸風飧泄風久而傳入腸胃熱則腸風下血寒則飧泄瀉利外在腠理則為泄風偶當汗泄而風客於腠名為泄風故風者風病之長也至其變化乃為他病也無常方然致有風氣也長者始也骨空論曰風為百病之始風之始入自淺而深至於變化乃為他病故為百病之長無常方者言風病變化無常方體而其致之者則皆因於風耳評熱病論曰邪之所湊其氣必虛元氣充周病無從入氣虛則不能衛外而為固玄府不閉風邪因而客焉厥論曰陽氣衰於下則為寒厥陰氣衰於下則為熱厥厥音逆也下氣逆上忽眩僕不知人事輕者漸蘇重則即死陰陽之氣衰於下則寒熱二厥由之而生也前陰者宗筋之所聚太陰陽明之所合也宗筋者衆筋之所聚也足之三陰陽明少陽及沖任督蹺筋脈皆聚於此獨言太陰陽明之合重水穀之臟也胃為水穀之海主潤宗筋又陰陽總宗筋之會會於氣街而陽明為之長也春夏則陽氣多而陰氣少秋冬則陰氣盛而陽氣衰此人者質壯以秋冬奪於所用下氣上爭不能復精氣溢下邪氣因從之而上也秋冬之令天氣收藏恃壯而喜內則與令違此奪於所用也精竭於下必上爭而求救於母氣腎所去者太過肺所生者不及故不能復也既已不足精氣復下則陽虛而陰邪勝之故寒氣逆上也氣因於中上則肺主氣下則腎納氣上下之氣皆因穀氣所化水穀在胃土居中州故曰氣因於中陽氣衰不能滲營其經絡陽氣日損陰氣獨在故手足為之寒也四肢皆稟氣於胃胃中之陽氣衰不能充滿其經絡陽敗則陰勝故手足寒也酒入於胃則絡脈滿而經脈虛經脈在內深而不見屬陰者也絡脈在外浮而可見屬陽者也酒者熟谷之液其氣悍疾為陽故先充絡脈酒熱傷陰故陽脈滿而經脈虛也脾主為胃行其津液者也陰氣虛則陽氣入陽氣入則胃不和胃不和則精氣竭精氣竭則不營其四肢也胃受水穀脾則行其津液濕熱傷脾則陰虛陽亢胃乃不和水穀之精氣竭矣豈能營四肢乎此人必數醉若飽以入房氣聚於脾中不得散酒氣與穀氣相薄熱盛於中故熱遍於身內熱而溺赤也夫酒氣盛而慓悍腎氣日衰陽氣獨勝故手足為之熱也醉飽入房脾腎交傷陰日竭而陽日亢故手足熱也按厥有寒熱未有不本於酒色故知慎飲食遠房幃者厥其免夫刺熱篇曰肝熱病者左頰先赤心熱病者額先赤脾熱病者鼻先赤肺熱病者右頰先赤腎熱病者頤先赤肝應東方故左頰先赤心應南方故額庭先赤脾應中央故鼻先赤肺應西方故右頰先赤腎應北方故兩頤先赤熱論篇帝曰今夫熱病者皆傷寒之類也或愈或死其死皆以六七日間其愈皆以十日以上者何也傷寒者受冬月寒邪也冬三月者為正傷寒至春變為溫病至夏變為熱病不曰至秋變為涼病者太陽寒水之邪遇長夏之土而勝也岐伯對曰巨陽者諸陽之屬也巨陽者太陽也太陽為六經之長總攝諸陽其脈連於風府故為諸陽主氣也人之傷於寒也則為病熱熱雖盛不死寒鬱於內皮膚閉而為熱寒散即愈故曰不死其兩感於寒而病者必不免於死兩感者一日太陽與少陰同病在膀胱則頭痛在腎則口乾煩滿二日陽明與太陰同病在胃則身熱讝語在脾則肢滿不欲食三日少陽與厥陰同病在少陽則耳聾在厥陰則囊滿三日傳遍再三日則死不待言矣傷寒一日巨陽受之故頭項痛腰脊強太陽為三陽之表而脈連風府故傷寒多從太陽始太陽經脈從頭項下肩挾脊抵腰故其病如此二日陽明受之陽明主肉其脈挾鼻絡於目故身熱目疼而鼻乾不得臥也胃不和則臥不安是也三日少陽受之少陽主膽其脈循脅絡於耳故胸脅痛而耳聾邪傳少陽者三陽已盡將傳太陰故為半表半裡邪在陰則寒在陽則熱在半表半裡故寒熱往來也三陽經絡皆受其病而未入於臟者故可汗而已三陽為表屬腑故可汗而愈也未入於臟者深明入臟則不可輕汗也四日太陰受之太陰脈布胃中絡於嗌故腹滿而嗌乾邪在三陽失於汗解則傳三陰自太陰始也五日少陰受之少陰脈貫腎絡於肺系舌本故口燥舌乾而渴腎本屬水而熱邪耗之故燥渴也六日厥陰受之厥陰脈循陰器而絡於肝故煩滿而囊縮傳至厥陰而六經遍矣邪熱已極故為煩滿三陰三陽五臟六腑皆受病榮衛不行五臟不通則死矣六經傳遍而邪不解臟腑皆受病矣氣血乏竭營衛不行則五臟之經脈不通不死安待其未滿三日者可汗而已其滿三日者可泄而已已者愈也未滿三日其邪在表發汗則病已滿三日者邪已傳裡攻下則病已此言大概也日數雖多脈浮而有三陽證者當汗之日數雖少脈沉而有三陰證者當下之此至要之法也瘧論帝曰夫痎瘧皆生於風其蓄作有時者何也凡秋瘧皆名痎即其皆生於風皆字知諸瘧之通稱也岐伯對曰瘧之始發也先起於毫毛伸缺乃作寒栗鼓頷腰脊俱痛寒去則內外皆熱頭痛如破渴欲冷飲陰陽上下交爭虛實更作陰陽相移也陽主上行陰主下行邪乘之則爭矣陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒邪入於陰則陰實陽虛邪入於陽則陽實陽虛故曰更作曰相移也陽並於陰則陰實而陽虛陽明虛則寒栗鼓頷也陽明虛則陰虛而陰實故寒栗也脈循頤頰故鼓頷也巨陽虛則腰背頭項痛三陽俱虛則陰氣勝陰氣勝則骨寒而痛終始篇曰病痛者陰也陰盛故頭痛骨亦痛也寒生於內故中外皆寒陽盛則外熱陰虛則內熱外內皆熱則喘而渴故欲冷飲也邪在陽分則內外皆熱故喘渴而冷飲此皆得之夏傷於暑熱氣盛藏於皮膚之內腸胃之外此營氣之所舍也夏暑汗泄何病之有或悽愴水寒或乘風納涼是熱大盛不能發越邪氣以營為舍矣此令人汗空疏腠理開此明風邪易客也因得秋氣汗出遇風及得之以浴水氣舍於皮膚之內與衛氣並居暑邪既伏秋風收之又因浴水而瘧作矣衛氣者晝日行於陽夜行於陰此氣得陽而外出得陰而內薄內外相薄是以日作衛氣之行於身也一日一周邪氣與衛氣並居與衛氣同行故瘧亦一日一作此衛受邪淺而易治也其氣之舍深內薄於陰陽氣獨發陰邪內著陰與陽爭不得出是以間日而作也邪之所居者深入於臟是內薄於陰分矣陽氣獨發者衛陽之行猶故也而邪之薄於陰者遲而難出故間日而作邪氣客於風府循膂而下風府督脈穴也膂者脊兩旁也下者下行至尾骶也衛氣一日一夜大會於風府其明日下一節故其作也晏衛氣之行也每日一會於風府若邪客風府必循膂而下其氣漸深則日下一節自陽就陰其會漸遲故其作漸晏也其出於風府日下一節二十五日下至骶骨二十六日入於脊內注於伏膂之脈項骨三節脊骨二十一節共二十四節邪自風府日下一節故二十五日下至尾骶復自後而前二十六日入於脊內注伏膂之脈其氣上行九日出於缺盆之中其氣日高故作日益早也邪在伏膂循脊而上無關節之阻故九日而出缺盆其氣日高則自陰就陽其邪日退故作漸早也夫寒者陰氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱也病以時作名曰寒瘧先傷於風而後傷於寒故先熱而後寒也亦以時作名曰溫瘧時作者或一日或間日不愆其期也其但熱而不寒者陰氣先絶陽氣獨發則少氣煩冤手足熱而欲嘔名曰疸瘧邪氣與衛氣客於六腑有時相失不能相得故休數日乃作也此即三日瘧也邪氣深重病在三陰邪氣不能與衛並出故休數日乃發數字當作三字溫瘧者得之冬中於風寒氣藏於骨髓之中至春則陽氣大發邪氣不能自出因遇大暑腦髓爍肌肉消腠理發泄或有所用力邪氣與汗皆出此病藏於腎其氣先從內出之於外也腎主冬令其應在骨故冬受風寒邪伏骨髓至春夏有觸而發自內而達於外者也如是者陰虛而陽盛陽盛則熱矣衰則氣復反入入則陽虛陽虛則寒矣故先熱而後寒名曰溫瘧此冬受寒邪至春發為溫瘧即傷寒也故傷寒論有溫瘧一症蓋本諸此疸瘧者肺素有熱氣盛於身厥逆上衝中氣實而不外泄因有所用力腠理開風寒舍於皮膚之內分肉之間而發發則陽氣盛陽氣盛而不衰則病矣其氣不及於陰故但熱而不寒氣內藏於心而外舍於分肉之間令人消爍脫肉故命曰疸瘧肺素有熱氣藏於心即此二語火來乘金陰虛陽亢明是不足之症挾外邪而然故溫瘧疸瘧皆非真瘧也咳論曰皮毛者肺之合也皮毛先受邪氣邪氣以從其合也其寒飲食入胃從肺脈上至於肺則肺寒肺寒則內外合邪因而客之則為肺咳五臟各以其時受病非其時各傳以與之人與天地相參故五臟各以治時感於寒則受病微則為咳甚則為泄為痛乘秋則肺先受邪乘春則肝先受之乘夏則心先受之乘至陰則脾先受之乘冬則腎先受之五臟六腑皆能成咳然必肺先受邪而傳之於各經也邪寒邪也所謂形寒飲冷則傷肺是也五臟各以其時受病輕者淺而在皮毛重者深而在腸胃故咳外症也泄里症也寒在表則身痛寒在裡則腹痛曰先受之者次必及乎肺而為咳也肺咳之狀咳而喘息有音甚則唾血肺主氣而司呼吸故喘息有音心咳之狀咳則心痛喉中介介如梗狀甚則咽腫喉痹心脈上挾於咽故喉中如梗至於痹則痛矣肝咳之狀咳則兩脅下痛甚則不可以轉轉則兩胠下滿肝之脈布脅肋故脅下痛胠脅之下也脾咳之狀咳則右胠下痛陰陰引肩背甚則不可以動動則咳劇脾脈上膈挾咽其支者復從胃別上膈脾處右故右胠下痛痛引肩背也脾土喜靜動則違其性故增劇也腎咳之狀咳則腰背相引而痛甚則咳涎腎脈貫脊繫於腰背故相引而痛腎屬水主涎故為咳涎也五臟之久咳乃移於六腑脾咳不已則胃受之胃咳之狀咳而嘔嘔甚則長蟲出胃者脾之妻也故脾咳必傳於胃而為嘔唾長蟲處於胃嘔甚則隨氣而出也肝咳不已則膽受之膽咳之狀咳嘔膽汁膽汁者苦汁也肺咳不已則大腸受之大腸咳狀咳而遺矢遺矢者大便不禁也心咳不已則小腸受之小腸咳狀咳而失氣氣與咳俱失大腸之氣由於小腸之化故小腸咳則氣達於大腸而轉失氣也腎咳不已則膀胱受之膀胱咳狀咳而遺溺膀胱為津液之府故遺溺久咳不已則三焦受之三焦咳狀咳而腹滿不欲食飲久咳則上中下三焦俱病一身之氣皆逆故腹滿不能食飲也此皆聚於胃關於肺使人多涕唾而面浮腫氣逆也聚於胃者胃為五臟六腑之本也關於肺者肺為皮毛之合也涕唾者肺與胃司之面浮腫者氣上逆而急也經脈別論曰夜行則喘出於腎淫氣病肺夜屬於陰行則勞其身半以下且夜行多恐故喘出於腎也腎水傷則無以禁火之炎而肺金受賊矣有所墮恐喘出於肝淫氣害脾墮而恐者傷筋損血故喘出於肝肝木伐土故害脾也有所驚恐喘出於肺淫氣傷心且驚且恐則氣衰而神亂肺主氣心藏神故二臟受傷也度水跌僕喘出於腎與骨水氣通於腎跌僕傷其骨故喘出焉當是之時勇者氣行則已怯者著而為病也勇者氣足神全故一時所動之氣旋即平復不足之人隨所受而成病矣腹中論曰心腹滿旦食則不能暮食名為鼓脹脹甚則腹皮繃急中空無物鼓之如鼓故名鼓脹治之以雞矢醴一劑知二劑已雞胃能消金石其矢之性等於巴豆通利二便消積下氣但宜於壯實之人虛者服之禍不旋踵即經云一劑便知其效二劑便已其病亦狀其猛利也用干羯雞矢一升炒微焦入無灰酒三碗煎至減半取清汁五更熱飲即腹鳴辰巳時行二三次皆黑水也飲一劑覺足有皺紋飲二次即愈矣靈樞脹論曰夫心脹者煩心短氣臥不安肺脹者虛滿而喘咳肝脹者脅下滿而痛引小腹脾脹者善噦四肢煩悗體重不能勝衣臥不安腎脹者腹滿引背央央然腰髀痛此五臟之脹也悶亂曰悗央央者困苦之貌胃脹者腹滿胃脘痛鼻聞焦臭妨於食大便難大腸脹者腸鳴而痛濯濯冬日重感於寒則飧泄不化小腸脹者小腹䐜脹引腰而痛膀胱脹者少腹滿而氣癃三焦脹者氣滿於皮膚中輕輕然而不堅膽脹者脅下痛脹口中苦善太息此六腑之脹也濯濯腸鳴水聲也飧泄完穀不化也氣癃者小便不利也厥氣在下營衛留止寒氣逆上真邪相攻兩氣相搏乃合為脹也厥逆之氣自下而上則營衛之行失其常度真氣與邪氣相攻合而為脹也靈樞水脹篇曰目窠上微腫如新臥起之狀目之下為目窠如新臥起者形如臥蠶也其頸脈動時咳頸脈足陽明人迎也陽明之脈自人迎下循腹裡而水邪乘之故為頸脈動水之標在肺故時咳陰股間寒足脛腫腹乃大其水已成矣以手按其腹隨手而起如裹水之狀此其候也此上皆言水腫之候膚脹者寒氣客於皮膚之間𪔣𪔣然不堅腹大身盡腫皮厚𪔣𪔣鼓聲也寒氣客於皮膚陽氣不行病在氣分故有聲如鼓氣本無形故不堅氣無所不至故腹大身盡腫而皮厚也按其腹窅而不起腹色不變此其候也氣在膚間按散者不能猝復故窅而不起皮厚故腹色不變也鼓脹者腹脹身皆大大與膚脹等也色蒼黃腹筋起此其候也鼓脹膚脹大同小異只色蒼黃腹筋起為別耳夫腸覃者寒氣客於腸外與衛氣相搏氣不得榮因有所繫癖而內著惡氣乃起瘜肉乃生覃之為義延布而深也寒氣薄衛滯而不行留於腸外故癖積起瘜肉生也其始生也大如雞卵稍以益大至其成如懷子之狀久者離歲按之則堅推之則移月事以時下此其候也離歲越歲也邪在腸外不在胞中故無妨於月事皆由汁沫所聚非血病可知也石瘕生於胞中寒氣客於子門子門閉塞氣不得通惡血當瀉不瀉衃音不以留止日以益大狀如懷子月事不以時下皆生於女子可導而下衃敗血凝聚也子門閉塞衃血留止其堅如石故名石瘕月事不以時下無經可至也可以導血之劑下之按腸覃石瘕皆言月事則此二症惟女人有之故曰皆生於女子也平人氣象論曰頸脈動喘疾咳曰水頸脈乃結喉旁動脈足陽明之人迎也水氣上逆則侵犯陽明故頸脈動水溢於肺則喘而咳目裹微腫如臥蠶起之狀曰水目之下胞曰目裹胃脈之所至脾脈之所主若微腫如臥蠶狀是水氣犯脾胃也溺黃赤安臥者黃疸溺色黃赤而安臥自如必成黃疸也已食如飢者胃疸胃熱善消穀故雖食常飢此名胃疸面腫曰風風為陽邪故曰高巔之上惟風可到此面腫所以屬風也足脛腫曰水水為陰邪潤下之品故足腫腫者為水也目黃者黃疸諸經有熱皆上熏於目故黃疸者目黃舉痛論曰經脈流行不止環周不休寒氣入經而稽遲泣而不行客於脈外則血少客於脈中則氣不通故卒然而痛泣者澀而不利也寒氣客於脈外則脈寒脈寒則縮踡縮踡則脈絀急絀急則外引小絡故卒然而痛得炅則痛立止經脈受寒則縮縮則急故卒痛然客於脈外者其邪淺故才得炅氣則立止也因重中於寒則痛久矣重者重復受寒也傷之深故不易愈也寒氣客於經脈之中與炅氣相薄則脈滿滿則痛而不可按也營行脈中血不足者脈中常熱新寒與故熱相薄則邪實而脈滿按之則痛愈甚故不可按也寒氣客於腸胃之間膜原之下血不得散小絡急引故痛按之則血氣散故按之痛止膜脂膜與筋膜也原者肓之原即腹中空隙之處血凝則小絡急痛按著空處則寒散絡緩故痛止非若經脈之無罅隙者按之愈痛也寒氣客於挾脊之脈則深按之不能及故按之無益也挾脊者足太陽經也其最深者則伏沖伏膂之脈故手按不能及其處也寒氣客於衝脈衝脈起於關元隨腹直上寒氣客則脈不通脈不通則氣因之故喘動應手矣衝脈起於胞中即關元也其脈並足少陰腎經夾臍上行會於咽喉而腎脈上連於肺犯寒則脈不通而氣因以逆故喘曰應手者動之甚也寒氣客於背俞之脈脈泣脈泣則血虛血虛則痛其俞注於心故相引而痛按之則熱氣至熱氣至則痛止矣背俞五臟俞也皆足太陽經穴太陽之脈循膂當心上出於項故寒氣客之則脈泣血虛背與心相引而痛因其俞注於心也血虛而痛故按之而痛止寒氣客於厥陰之脈厥陰之脈者絡陰器繫於肝寒氣客於脈中則血泣脈急故脅肋與少腹相引痛矣少腹脅肋皆肝之部分也厥氣客於陰股寒氣上及少腹血泣在下相引故腹痛引陰股厥氣寒而上逆之氣也陰股少腹乃足三陰衝脈所由行也寒氣客於小腸膜原之間絡血之中血泣不得注於大經血氣稽留不得行故宿昔而成積矣小腸為受盛之府化物出焉寒氣客於膜原及小絡則血澀不得注於大經化物失職久而成積矣寒氣客於五臟厥逆上泄陰氣竭陽氣未入故卒然痛死不知人氣復反則生矣五臟皆受邪厥逆而泄越於上陰氣暴竭陽氣未能遽入故卒然痛死或得炅則氣復反而生矣寒氣客於腸胃厥逆上出故痛而嘔也胃為水穀之海腸為水穀之道皆主行下者也寒邪傷之則逆而上出故痛而嘔寒氣客於小腸小腸不得成聚故後泄腹痛矣小腸與丙火為表裡成聚即受盛之義也則失其受盛之常故泄而腹痛熱氣留於小腸腸中痛疸熱焦渴則堅干而不得出故痛而閉不通矣大抵營衛臟腑之間得熱即行遇冷即凝故痛皆因於寒也此一條獨言熱痛卻由於便閉不通故痛仍非火之自為痛也故曰通則不痛痛則不通痹論曰風寒濕三氣雜至合而為痹也痹者閉也不仁也六氣之中風寒濕為陰邪陰氣合病則閉塞成冬之象故血氣不流經絡壅閉而痹斯作矣其風氣勝者為行痹風屬陰中之陽善行而數變故為行痹凡走注歷節疼痛之類俗名流火是也寒氣勝者為痛痹陰寒之氣乘於肌肉筋骨則凝泣稽留閉而不通故為痛痹即痛風也濕氣勝者為著痹也著痹者重著不移濕從土化故病在肌肉不在筋骨也肺痹者煩滿喘而嘔肺在上焦脈循胃口故為煩滿喘而且嘔心痹者脈不通煩則心下鼓暴上氣而喘嗌乾善噫厥氣上則恐脈者心之合也心受病則脈不通心脈支者上挾咽直者卻上肺故其病如此厥逆則水邪侮火故神傷而恐恐者腎志也肝痹者夜臥則驚多飲數小便上為引如懷肝受邪則魂不安寧故夜臥多驚閉而為熱故多飲數小便也上為引者引飲也如懷者腹大如懷物也木邪侮土故為病如此腎痹者善脹尻以代踵脊以代頭腎者胃之關腎痹則邪並及胃故腹善脹尻以代踵者足不能伸也脊以代頭者身僂不能直也脾痹者四肢解惰發咳嘔汁上為大塞脾主四肢又主困倦故為解惰土傷則金亦傷故咳妻病故夫亦病故嘔坤已不升乾金不降大塞之象也腸痹者數飲而出不得中氣喘爭時發飧泄腸痹則下焦之氣閉而不行故數飲而溺不得出氣化不及州都返而上逆故喘爭也小便不利則水液混於大腸故飧泄也胞痹者少腹膀胱按之內痛若沃以湯澀於小便上為清涕胞溺之脬也膀胱氣閉則水液壅滿故按之內痛也氣閉則熱如湯之沃也膀胱之脈從巔絡腦故小便下澀清涕上出也痛者寒氣多也有寒故痛也寒則血氣凝泣故痛終始篇曰病痛者陰也病久入深營衛之行澀經絡時疏故不痛此言病則營衛澀而必痛其不痛者經絡有疏散之時則不澀故不痛也皮膚不營故為不仁皮膚之間無血以和之故不仁也陽氣少陰氣多與病相益故寒也痹病本屬陰寒若陽氣不足之人則寒從內起與外病相助益故寒也陽氣多陰氣少病氣勝陽遭陰故為痹熱其人陽氣素盛而遭陰寒之氣病氣反為陽氣勝矣故為熱痹其多汗而濡者此其逢濕甚也陽氣少陰氣盛兩氣相感故汗出而濡也兩氣者身中之氣與外客之氣兩氣皆陰互相感召故汗出脈要精微論曰陰氣有餘為多汗身寒是也凡痹之類逢寒則急逢熱則縱寒則筋攣故急熱則筋弛故縱痿論曰肺熱葉焦則皮毛虛弱急薄著則生痿躄也火來乘金在內為肺葉焦枯在外為皮毛虛薄熱氣著而不去則為痿躄躄者足不能行也心氣熱則下脈厥而上上則下脈虛虛則生脈痿樞折挈脛縱而不任地也心火上炎則三陰在下之脈亦厥逆而上上盛則下虛乃生脈痿四肢關節之處如樞紐之折而不能提挈足腫縱緩而不能任地也肝氣熱則膽泄口苦筋膜乾筋膜乾則筋急而攣發為筋痿肝熱則膽亦熱故汁溢而口苦血海乾枯筋無以榮則攣急而痿脾氣熱則胃干而渴肌肉不仁發為肉痿脾與胃為夫妻而開竅於口故脾熱則胃干而渴脾主肌肉熱淫於內則脾陰耗損故肉不仁而為痿腎氣熱則腰脊不舉骨枯而髓減發為骨痿腰者腎之府脊者腎之所貫也腎主骨故骨枯為痿肺者臟之長也為心之蓋也肺位至高故謂之長覆於心上故謂之蓋有所失亡所求不得則發肺鳴鳴則肺熱葉焦有志不遂則鬱而生火火來乘金不得其平則自鳴肺鳴者其葉必焦大經空虛發為肌痹傳為脈痿血不足則大經空虛無以充養肌肉故先為肌痹而後傳於心為脈痿也思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿及為白淫思而不得則意淫於外入房太過則精傷於內陰傷而筋失所養故為縱為痿火動於中水虧於下乃為白淫白淫者男濁女帶也有漸於濕以水為事若有所留居處相濕肌肉濡漬痹而不仁發為肉痿漸染也以水為事常近水也久於水則有所留矣居處之地又當卑濕則肌肉受濕而濡漬故頑痹而成肉痿也有所遠行勞倦逢大熱而渴渴則陽氣內伐內伐則熱舍於腎腎者水臟也今水不勝火則骨枯而髓虛故足不任身發為骨痿遠行勞倦則所傷在骨逢大熱者或逢天令之熱或陰不足而本熱火則氣太過水液必耗故骨枯髓虛而為痿也治痿者獨取陽明何也陽明者五臟六腑之海主潤宗筋宗筋主束骨而利機關也足陽明胃主納水穀變化氣血以充一身故為五臟六腑之海而下潤宗筋宗筋者前陰所聚之筋為諸筋之會一身之筋皆屬於此故主束骨而利機關衝脈者經脈之海也主滲灌溪谷與陽明合於宗筋衝脈為十二經之血海故主滲灌溪谷衝脈起於氣街並少陰之經夾臍上行陽明脈亦夾臍旁下行故皆合於宗筋陰陽總宗筋之會會於氣街而陽明為之長皆屬於帶脈而絡於督脈宗筋聚於前陰前陰者足之三陰及陽明少陽沖任督蹺九脈之所會也九脈之中惟陽明為臟腑之海衝脈為經脈之海此一陰一陽總之故曰陰陽總宗筋之會會於氣街者氣街為陽明之正脈故陽明獨為之長帶脈起於季脅圍周一身督脈起於會陰分三歧為任沖而上行腹背故諸經皆聯屬於帶脈支絡於督脈也故陽明虛則宗筋縱帶脈不引故足痿不用也逆調論曰不得臥而息有音者是陽明之逆也足三陽者下行今逆而上行故息有音也足之三陽其氣皆下行足之三陰其氣皆上行此天氣下降地氣上升之義故陽明以上行為逆逆則沖肺故息有音也陽明者胃脈也胃者六腑之海其氣亦下行陽明逆不得從其道故不得臥也胃不和則臥不安此之謂也凡人之寤寐由於衛氣衛氣者晝日行於陽則動而為寤夜行於陰則靜而為寐胃氣逆上則衛氣不得入於陰故不得臥靈樞邪客篇曰厥氣客於五臟六腑則衛氣獨衛其外行於陽不得入於陰行於陽則陽氣盛陽氣盛則陽蹺陷不得入於陰陰虛故目不瞑調其虛實以通其道而去其邪飲以半夏湯一劑陰陽已通其臥立至不臥之病有心血不足者法當養陰有邪氣逆上者法當祛邪半夏湯者去邪之法也以流水千里以外者八升揚之萬遍取其清五升煮之炊以葦薪千里流水取其流長源遠有疏通下達之義也揚之萬遍令水珠盈溢為甘瀾水可以調和陰陽炊以葦薪者取其火烈也火沸置秫米一升治半夏五合徐炊令竭為一升半火沸言未投藥而水先沸也秫米糯小米也北人呼為小黃米味甘性平能養胃和中用以為君治半夏猶言制過半夏也味辛性溫能下氣化痰用以為臣去其滓飲汁一小杯日三稍益以知為度知者病愈也故其病新發者覆杯則臥汗出則已矣久者三飲而已也方盛衰論曰肺氣虛則使人夢見白物見人斬血籍籍得其時則夢見兵戰金色本白故夢白物斬者金之用也虛者多畏怯故見斬血籍籍也得其時者得金旺之時也腎氣虛則使人夢見舟船溺人得其時則夢伏水中若有畏恐腎屬水故夢應之得水旺之時夢水益大也恐腎之志也肝氣虛則夢見菌香生草得其時則夢伏樹下不敢起肝之應在木雖當木旺之時亦夢伏樹下也心氣虛則夢救火陽物得其時則夢燔灼心合火陽物即火之屬也得火旺之令夢火益大也脾氣虛則夢飲食不足得其時則夢築垣蓋屋倉廩空虛故思飲食得土旺之令則夢高土也靈樞淫邪發夢篇曰陰氣盛則夢涉大水而恐懼陽氣盛則夢大火而燔焫陰陽俱盛則夢相殺俱盛則爭上盛則夢飛下盛則夢墮本乎天者親上本乎地者親下甚飢則夢取甚飽則夢豫肝氣盛則夢怒肺氣盛則夢恐懼哭泣飛揚肺主氣故夢飛揚心氣盛則夢善笑恐畏脾氣盛則夢歌樂身體重不舉腎氣盛則夢腰脊兩解不屬厥氣客於心則夢見丘山煙火客於肺則夢飛揚見金鐵之奇物客於肝則夢山林樹木客於脾則夢見丘陵大澤壞屋風雨客於腎則夢臨淵沒居水中客於膀胱則夢遊行客於胃則夢飲食客於大腸則夢田野大腸曲折納汙類田野也客於小腸則夢聚邑沖衢小腸為受盛之官類沖衢也客於膽則夢鬥訟自刳膽性剛猛自刳者自剖其腹也客於陰器則夢接內客於項則夢斬首客於脛則夢行走而不能前及居深地窖苑中客於股肱則夢禮節拜起客於胞䐈則夢溲便胞即脬也䐈大腸也在前則夢溲在後則夢便脈要精微論曰短蟲多則夢聚衆長蟲多則夢相擊毀傷靈樞癰疽篇曰夫血脈營衛周流不休上應星宿下應經數寒邪客於經絡之中則血泣血泣則不通不通則衛氣歸之不得復反故癰腫寒氣化為熱熱勝則腐肉肉腐則為膿膿不瀉則爛筋筋爛則傷骨骨傷則髓消不當骨空不得泄瀉血枯空虛則筋骨肌肉不榮經脈敗漏熏於五臟臟傷故死矣始受寒邪血脈凝泣久而不去寒化為熱癰疽乃成傷於臟者死不治癰發於嗌中名曰猛疽猛疽不治化為膿膿不瀉塞咽半日死其化為膿者瀉則合豕膏冷食三日而已猛疽言其凶惡猛厲也若膿已瀉潰當服豕膏即豬脂之煉淨者也萬氏方治肺熱暴喑用豬脂一斤去筋入白蜜一斤再煉少頃濾淨冷定不時挑服一匙即愈發於頸名曰夭疽其癰大以赤黑不急治則熱氣下入淵腋前傷任脈內熏肝肺十餘日而死矣夭疽者在天柱也俗名對口赤者心之色黑者熱極反兼勝己之化也急須治之可活若治之稍遲或治之失宜則毒流肺肝而死矣陽氣大發消腦留項名曰腦爍其色不樂項痛而如刺以針煩心者死不可治陽大發者毒太甚也色不樂者神傷而色變即所謂色夭也毒深故痛如針刺邪犯心君故煩心而死發於肩及臑名曰疵癰其狀赤黑急治之此令人汗出至足不害五臟癰發四五日逞焫之肩膊下軟白肉曰臑此肺脈之病肺主玄府故遍身得汗也毒從汗減且非要害之所故不害五臟也逞者急也焫者艾炷也言宜急灸也發於腋下赤堅者名曰米疽治之以砭石欲細而長疏砭之塗以豕膏六日已勿裹之砭石欲細者恐傷肉也欲長者用在深也故宜疏不宜密勿裹之者欲其氣疏泄也豕膏者即豬油煎當歸以蠟收者也其癰堅而不潰者為馬刀挾纓急治之挾當作俠纓當作癭馬刀者瘰癧也俠癭者俠頸之瘤屬也發於胸名曰井疽其狀如大豆三四日起不早治下入腹不治七日死矣井者喻其深而惡也發於胸者近犯心主治之宜早下入腹則五臟俱敗死期速矣發於膺名曰甘疽色青其狀如榖實𦸈藪常苦寒熱急治之去其寒熱十歲死死後出膿膺在胸旁高肉處逼近在乳上也穴名膺窗足陽明胃之脈也土味甘故曰甘疽色青者肝木剋土也層房纍纍狀如榖實瓜蔞軟而不潰中有所蓄如瓜子也十歲死者綿延難愈也發於脅名曰敗疵敗疵者女子之病也灸之其病大癰膿治之其中乃有生肉大如赤小豆銼䔖𧄍草根各一升以水一斗六升煮之竭為取三升則強飲厚衣坐於釜上令汗出至足已脅者肝之部也婦人多鬱怒故患此瘡䔖芰也𧄍連翹也二草之根俱能解毒強飲者乘其熱而強飲之復厚衣坐於熱湯之釜熏蒸取汗汗出至足乃透已者愈也發於股脛名曰股脛疽其狀不甚變而癰膿搏骨不急治三十日死矣股脛大股也狀不甚變外形不顯也癰膿搏骨即所謂貼骨癰也毒盛而深能下蝕三陰陽明之大經故不為急治法當三十日死矣發於尻名曰鋭疽其狀赤堅大急治之不治三十日死矣尻尾骶骨也穴名長強為督脈之絡一名氣之陰郤故不治則死發於股陰名曰赤施不急治六十日死在兩股之內不治十日而當死股陰大股內側也當足太陰箕門血海及足厥陰五里陰包之間皆陰氣所聚之處故不治則死若兩股俱病則傷陰之極其死尤速赤施者想其當血海故名發於膝名曰疵癰其狀大癰色不變寒熱如堅石勿石之石之者死須其柔乃石之者生石之者砭也色不變者不紅赤也硬者禁用砭軟者方可用砭也諸癰之發於節而相應者不可治也發於陽者百日死發於陰者三十日死諸節者神氣所遊行出入也相應者發於上而應於下發於左而應於右法在不治發於三陽之分毒淺在腑其死緩發於三陰之分者毒深在臟不出一月也發於脛名曰兔齧其狀赤至骨急治之不治害人也脛足脛也兔齧如兔所齧傷也為其在下高低等於兔也發於內踝名曰走緩其狀癰也色不變數石其輸而止其寒熱不死數石者屢屢砭之也其輸即腫處也發於足上下名曰四淫其狀大癰急治之百日死陽受氣於四末而大癰淫於其間陽毒之甚也時氣更易則真陰日敗逾三月而死矣發於足旁名曰厲癰其狀不大初如小指發急治之去其黑者不消輒益不治百日死去其黑者而猶不消反益大焉則百日必死矣發於足指名曰脫癰其狀赤黑死不治不赤黑不死不衰急斬之不則死矣六經原腧皆在於足所以癰發於足者多為凶候至於足指又皆六井所出色赤黑者其毒尤甚若不衰退急斬去其指庶可保生若稍緩毒發傷臟而死營衛稽留於經脈之中則血泣而不行不行則衛氣從之而不通壅遏而不得行故熱大熱不止熱勝則肉腐肉腐則為膿然不能陷骨髓不為焦枯五臟不為傷故命曰癰熱氣淳盛下陷肌膚筋髓枯內連五臟血氣竭當其癰下筋骨良肉皆無餘故命曰癰癰字從壅疽字從阻總是氣血稽留營衛不通之症大而淺者為癰六腑受傷可無大患深而惡者為疽五臟受傷大可憂畏治之者顧可緩乎顧可忽乎疽者上之皮夭以堅上如牛領之皮癰者其皮上薄以澤夭者色枯暗也牛皮喻其厚也澤者光亮也靈樞玉版篇曰白眼青黑眼小是一逆也內藥而嘔者是二逆也腹痛渴甚是三逆也肩項中不便是四逆也音嘶色脫是五逆也靈樞寒熱病篇曰身有五部伏兔一腓二背三五臟之腧四項五此五部有癰疽者死伏兔者胃之穴名在膝上六寸陰市上五寸腓者足肚也即踹也腎之脈上踹內之築賓穴背者五臟之所繫也腧者五臟之所主也項者諸陽之要道也犯此五者亦名五逆靈樞玉版篇曰腹脹身熱脈大是一逆也身熱脈大而又腹脹表裡之邪俱盛也腹鳴而滿四肢清泄其脈大是二逆也腹滿而清泄陰症也脈大者是脈與症反也衄而不止脈大是三逆也鼻衄在陰脈大為陽陽實陰虛死不治咳且溲血脫形其脈小徑是四逆也咳而溲血脫形正氣傷也脈雖小而徑邪仍在也咳脫形身熱脈小以疾是謂五逆也脫形真氣已衰身熱邪氣未化細小疾數氣血兩敗之診也如是者不過十五日而死矣十五日交一節言不能逾節也其腹大脹四末清脫形泄甚是一逆也腹大脹者邪正甚也四肢冷而脫形泄甚脾已絶矣腹脹便血其脈大時絶是二逆也腹脹便血陰脫也脈大時絶陽脫也咳溲血形肉脫脈搏是三逆也咳而溲者氣血俱損形肉脫者脾已絶脈搏者真臟見矣嘔血胸滿引背脈小而疾是四逆也嘔血而至胸滿背曲病已極矣脈小屬氣敗脈疾屬血敗咳嘔腹脹且飧泄其脈絶是五逆也上為咳嘔中為脹滿下為飧泄三焦俱病六脈已絶如是者不及一時而死不及一時者不能周一日之時也標本病傳論曰夫病傳者心病先心痛病在心者先心痛一日而咳心病傳肺火剋金也三日脅支痛肺復傳肝金剋木也故脅支痛五日閉塞不通身痛體重肝傳脾木剋土也脾病則閉塞不通脾主肌肉故身體重痛三日不已死再三日不已則脾又傳腎土剋水也五臟俱傷故死冬夜半夏日中冬月夜半水旺之極也夏月日中火旺之極也火畏水故冬則死於夜半陽邪亢極故夏則死於日中蓋衰極亦死盛極亦死也肺病喘咳肺主息故病喘咳三日而脅支滿痛三日而之肝金剋木也一日身重體痛一日之脾木剋土也五日而脹五日而之胃臟傳腑也十日不已死十日不已胃復傳腎五行之數已極故死冬日入夏日出此卯酉二時屬燥金之化肝病頭目眩脅支滿肝開竅於目而經脈布於脅肋三日體重身痛三日傳脾五日而脹脾傳胃也三日腰脊少腹痛脛痠三日傳腎也三日不已死三日不已腎復傳心故死冬日入夏早食亦卯酉時也燥金主之木所畏也脾病身痛體重脾主肌肉一日而脹脾傳胃也二日少腹腰脊痛脛痠胃傳腎也三日背𦛗筋痛小便閉三日而胃傳膂膀胱也十日不已死十日不已復傳於心故死冬人定夏晏食此巳亥時也司風木之化脾病畏之腎病少腹腰脊痛胻痠腎主下部經脈行於少腹腰脊胻骨之間三日背𦛗筋痛小便閉三日而傳膂膀胱也三日腹脹三日而傳小腸三日兩脅支痛三日而上傳心手心主之正別下淵腋三寸入胸中故兩脅支痛三日不已死夏傷肺金也冬大晨夏晏脯此辰戌時也土旺四季為水所畏故腎病絶焉胃病脹滿五日少腹腰脊痛胻痠五日之腎也三日背𦛗筋痛小便閉三日之膂膀胱也五日身體重病傳論曰五日而上之心此云體重疑誤六日不已死心復傳肺冬夜半後夏日昳醜未司濕土之化氣通於胃失守則死膀胱病小便閉五日少腹脹腰脊痛胻痠五日而之腎也一日腹脹一日而之小腸一日身體痛一日而之心腑傳臟也心主血脈故為身體痛二日不已死心病不已必復傳金故死冬雞鳴夏下晡醜未時也土能制水故膀胱畏之相傳死期各有遠近臟有要害不同也以次相傳者必死間一二臟或三四臟者可以治矣靈樞經脈篇曰手太陰氣絶則皮毛焦太陰者行氣溫於皮毛者也故氣不榮則皮毛焦皮毛焦則津液去皮節津液去皮節者則爪枯毛折毛折者毛先死丙篤丁死火勝金也肺屬金主氣為水之母故其氣絶則津液去而爪枯毛折也手少陰氣絶則脈不通脈不通則血不流血不流則髦色不澤故其面黑如漆柴者血先死壬篤癸死水勝火也心主血脈故心絶則血先死其症在髦色不澤面黑如漆水化見也足太陰氣絶則脈不榮肌肉唇舌者肌肉之本也脈不榮則肌肉軟肌肉軟則舌萎人中滿人中滿則唇反唇反者肉先死甲篤乙死木勝土也脾主肌肉故脾絶則肉先死其症在舌萎人中滿唇反也足少陰氣絶則骨枯少陰者冬脈也伏行而濡骨髓者也故骨不濡則肉不能著也骨肉不相親則肉軟卻肉軟卻故齒長而垢發無澤發無澤者骨先死戊篤已死土勝水也腎屬水故為冬脈腎主骨故腎絶則骨先死其症在骨肉不相親附則齒長而垢精枯發無澤也足厥陰氣絶則筋絶厥陰者肝脈也肝者筋之合也筋者聚於陰氣當作器而脈絡於舌本也故脈弗榮則筋急筋急則引舌與卵故唇青舌卷卵縮則筋先死庚篤辛死金勝木也肝絶者筋先死其症在唇青舌卷而卵縮囊蜷也五陰氣俱絶則目系轉轉則目暈目暈者為志先死志先死則遠一日半死矣五臟之精上注於目故五陰氣絶則目轉而暈志先死矣志藏於腎真陰已竭死在周日間耳六陽氣絶則陰與陽相離離則腠理發泄絶汗乃出故旦占夕死夕占旦死陽氣不能衛外而為固則汗泄絶汗者其形如珠凝而不流或氣喘不休汗出如洗者是也陰陽類論曰冬三月之病病合於陽者至春正月脈有死徵皆歸出春冬三月陰盛之時而見陽病者至春初陽氣發動之令脈必有死徵矣出春者交夏也陽病當陽盛則亢極而不可免矣冬三月之病在理已盡草與柳葉皆殺在理已盡謂色脈形症皆無生理則交春草色青柳葉見皆其死期也春陰陽皆絶期在孟春冬月之病甫交春而陰陽皆絶則不待仲季即於孟春是其死期矣陰絶者脈形不至陽絶者脈形微細或上不至關為陽絶下不至關為陰絶春三月之病曰陽殺殺音賽陽氣衰也陽氣方生之令而陽氣衰敗不能應令也陰陽皆絶期在草乾春令木旺之症而陰陽俱絶至秋令草乾之時金勝木而死矣夏三月之病至陰不過十日金匱真言論曰脾為陰中之至陰五臟六腑之本也以至陰之臟而當陽極之時苟犯死症期在十日陰陽交期在溓音廉水陰陽交者陰脈見於陽則陽氣失守陽脈見於陰則陰氣失守夏月而見此逆象則仲秋溓水之期不能保其生矣秋三月之病三陽俱起不治自已秋時陽氣漸衰陰氣漸長雖三陽之病俱起而陽不勝陰故自已陰陽交合者立不能坐坐不能起陰陽交合者陰陽合病也起坐不能者屈伸不利也三陽陽當作陰獨至期在石水陰病而當陰盛則孤陰不生矣冰堅如石之候不能再生即上文三陽俱起不治自愈下文二陰期在盛水則此為三陰無疑二陰獨至期在盛水二陰病比之三陰病者差緩焉故期在盛水盛水者正月雨水也診要經終論曰太陽之脈其終也戴眼反折瘛瘲其色白絶汗乃出出則死矣戴眼者目睛仰視而不能轉也反折者腰脊反張也筋急曰瘛筋緩曰瘲絶汗者汗出如油也足太陽之脈起於目內眥上額交巔入絡腦下項夾脊抵腰中下至足之小指手太陽之脈起於小指之端循臂上肩其支者循頸上頰至目之外眥故其病如此又太陽為三陽之表故主色白汗出少陽終者耳聾百節皆縱目睘絶系絶系一日半死其死也色先青白乃死矣手足少陽之脈皆入於耳中亦皆至於目鋭眥故為耳聾目睘也睘者直視如驚也因少陽之系絶不能旋轉也膽應筋故百節縱也木之色青金之色白金木相賊則青白先見矣陽明終者口目動作善驚妄言色黃其上下經盛不仁則終矣手足陽明之脈皆挾口入目故口目動作也聞木音則惕然而驚是陽明善驚也罵詈不辨親疏是陽明妄言也黃者土色外見也上下經盛謂頭頸手足陽明之脈皆躁動而盛是胃之敗也不知痛癢謂之不仁是肌肉之敗也少陰終者面黑齒長而垢腹脹閉上下不通而終矣手少陰氣絶則血敗足少陰氣絶則色如照故面黑也腎主骨齒者骨之餘故齒不固而垢也手少陰之脈下膈絡小腸足少陰之脈絡膀胱貫肝膈故為腹脹閉上下不通是心腎不交也太陰終者腹脹閉不得息善噫善嘔嘔則逆逆則面赤不逆則上下不通不通則面黑皮毛焦而終矣足太陰脈入腹屬脾故為腹脹閉手太陰脈上膈屬肺而主呼吸故不得息惟脹閉不得息故為噫為嘔氣逆於上故面赤不逆則脾之地氣不上升肺之天氣不下降上下不通者天地不交也脾敗無以制水故面黑肺敗不能主氣故皮毛焦也厥陰終者中熱嗌乾善溺心煩甚則舌卷卵上縮而終矣手厥陰心主之脈起於胸中出屬心包絡下膈歷絡三焦足厥陰肝脈循喉嚨之後上入頏顙其下者循股陰入毛中過陰器故為中熱嗌乾善溺心煩等症舌者心之官也肝者筋之合也筋者聚於陰器而脈絡於舌本故甚則舌卷卵縮也愚按人之有病猶樹之有蠹也病之有能猶蠹之所在也不知蠹之所在遍樹而斫之蠹未必除而樹先槁矣不知病之所在廣絡而治之病未必去而命先盡矣故病能至賾即較若列眉猶懼或失之病能未彰而試之藥餌吾不忍言也世醫矜家傳之祕時醫誇歷症之多悻悻賣俗而不知其非叩之三因之自與其所變翻以力贅是不欲知蠹之所在而弟思斫樹以為功者嘻亦慘矣
