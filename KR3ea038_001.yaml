body:
  text: 卷上一道生上古天真論曰夫上古聖人之教下也皆謂之虛邪賊風避之有時教下者教民避害也風從沖後來者傷人者也謂之虛邪賊風如月建在子風從南來對衝之火反勝也月建在卯風從西來對衝之金剋木也月建在午風從北來對衝之水剋火也月建在酉風從東來對衝之木反勝也必審其方隨時令而避之也恬淡虛無真氣從之精神內守病安從來恬者內無所營淡者外無所遂虛無者虛極靜篤即恬淡之極臻於自然也真氣從之者曹真人所謂神是性兮氣是命神不外弛氣自定張虛靜曰神一出便收來神返身中氣自回又曰人能常清靜天地悉皆歸真一之氣皆來從我矣精無妄傷神無妄動故曰內守如是之人邪豈能犯病安從生乎有真人者提挈天地把握陰陽呼吸精氣獨立守神肌肉若一真天真也不假修為故曰真人心同太極德契兩儀提挈把握也全真之人呼接天根吸接地脈精化為氣也獨立守神氣化為神也精氣皆化獨有神存故曰獨立肌肉若一者神還虛無雖有肌肉而體同虛空也仙家所謂抱元守一又曰了得一萬事畢即形與神俱之義也故能壽敝天地無有終時此其道生天地有質劫滿必敝真人之壽前乎無始後乎無終天地有敝吾壽無終矣此非戀於形生蓋形神俱微妙與道合真故曰此其道生者明非形生也有至人者淳德全道和於陰陽調於四時至者以修為而至者也淳者厚也德厚道全不愆於陰陽不逆於四時庶幾奉若天時者矣去世離俗積精全神去世離俗藏形隱跡也積精全神者煉精化氣煉氣化神也遊行天地之間視聽八遠之外全神之後便能出隱顯之神故遊行天地之間塵紛不亂便能徹耳目之障故視聽八遠之外此蓋益其壽命而強者也亦歸於真人前之真人則曰道生此言至人則曰壽命曰強但能全形而已亦歸於真人者言若能煉神還虛亦可同於真人此全以修為而至者也有聖人者處天地之和從八風之理聖者大而化之亦人中之超類者與天地合德四時合序故能處天地之和而氣賴以養從八風之理而邪弗能傷也八風者靈樞九宮八風篇云風從所居之鄉來者為實風主生長養萬物從其沖後來者為虛風傷人者也主殺主害從南方來名曰大弱風從西南方來名曰謀風從西方來名曰剛風從西北方來名曰折風從北方來名曰大剛風從東北方來名曰凶風從東方來名曰嬰兒風從東南方來名曰弱風適嗜欲於世俗之間無恚嗔之心被服章舉不欲觀於俗飲食有節起居有常適嗜欲也攝情歸性無恚嗔也和光混俗不離世也被服章者皋陶謨曰天命有德五服五章哉聖人之心不磷不淄雖和光混俗而未嘗觀效於俗也外不勞形於事內無思想之患以恬愈為務以自得為功形體不敝精神不散亦可以百數外不勞形則身安內無思想則神靜恬愈者調服七情也自得者素位而行無入不自得也如是者形不受賊精神不越而壽可百矣有賢人者法則天地象似日月辨列星辰逆從陰陽分別四時賢人者精於醫道者也法天地陰陽之理行針砭藥石之術智者能調五臟斯人是已將從上古合同於道亦可使益壽而有極時將從者有志慕古未能與之同其歸也合同於道者醫道通仙道也調攝營衛培益本元勿干天地之和自無夭札之患故曰亦可益壽亦者次別上文之聖人也有極時者天癸數窮形體衰憊針砭藥餌無可致力矣真人者無為而成至人者有為而至聖人治未病賢人治已病修詣雖殊尊生則一也按有物渾成先天地生強名曰道無跡象之可泥豈形質之能幾白玉蟾所以有四大一身皆屬陰不知何物是陽精之說也返本還元湛然常寂名之曰道積精全神益壽強命名之曰術文始經云忘精神而超生見精神而久生是也忘精神者虛極靜篤精自然化氣氣自然化神神自然還虛也見精神者虛靜以為本火符以為用煉精成氣煉氣成神煉神還虛也嗟吾人處不停之運操必化之軀生寄死歸誰其獲免貪求者妄殆自棄者失時即有一二盲修瞎煉皆以身內為工夫獨不聞胎息經云胎從伏氣中結氣從有胎中息氣入身來謂之生神去離形謂之死知神氣者可以長生氣有先天后天之別後天者呼吸往來之氣也先天者無形無象生天生地生人生物者也康節云乾遇巽時觀月窟地逢雷處見天根天根月窟間來往三十六宮都是春真既醉於先天之說也惜乎下手無訣訛傳錯教妄以兩目為月窟陽事為天根令人捧腹若得訣行持不過一時辰許先天祖氣忽然來歸鼻管如迎風之狀不假呼吸施為不事閉氣數息特須一言抉破可以萬古長存若非福分深長鮮不聞而起謗甚有俗醫笑其迂妄不知醫道通仙自古記之亦在乎人而已矣四氣調神大論曰春三月此謂發陳發生髮也陳敷陳也發育萬物敷布寰區故曰發陳天地俱生萬物以榮敷和之紀木德周行俱生者氤氳之氣也天地氤氳萬物化醇榮者顯也發也夜臥早起廣步於庭此言在天主發生之令在人須善養之方夫人臥與陰俱起與陽並臥既夜矣起復早焉令陽多而陰少以象春升之氣也廣步者動而不休養陽之道也被髮緩形以使志生被髮者舒在頭之春氣也緩者和緩以應令也如是則神志調適肖天氣之生矣生而勿殺豫而勿奪賞而勿罰尚書緯曰東方青帝好生不賊禹禁云春三月山林不登斧管子云解怨赦罪皆所以奉發生之德也此春氣之應養生之道也四時之令春生夏長秋收冬藏以上諸則乃養生氣之道也逆之則傷肝夏為寒變奉長者少逆者不能如上養生之道也奉者稟承也肝木旺於春春逆其養則肝傷而心火失其所奉故當夏令火不足而水侮之因為寒變寒變者變熱為寒也春生之氣既逆夏長之氣不亦少乎夏三月此謂蕃秀布葉曰蕃吐華曰秀萬物亨嘉之會也天地氣交萬物華實即司天在泉三四氣之交六元正紀大論所謂上下交互氣交主之是也陽氣生長於前陰氣收成於後故萬物華實夜臥早起毋厭於日臥起同於春令亦養陽之物也按荀子云夏不宛暍言當避赫曦之暍毋為日所厭苦使志無怒使華英成秀使氣得泄若所愛在外怒則氣上助火亢炎故使志無怒則生意暢遂譬如華英漸至成秀也氣泄者膚腠宣通法暢遂之時令也發舒之極遍滿乾坤其用外而不內人奉之以養生故所愛若在外不知正所以調其中也此夏氣之應養長之道也逆之則傷心秋為痎瘧奉收者少夜臥以下皆順夏令養長之道也否則與令為逆乘時秉政之心主不亦拂其性乎心傷則暑乘之秋金收肅暑邪內郁必為痎瘧夏長既逆則奉長氣而秋收者少矣冬至重病心火受傷綿延至冬則水來剋火病將重矣秋三月此謂容平陰升陽降大火西行萬物之容至此平定故曰容平天氣以急地氣以明風氣徑疾曰急物色清肅曰明早臥早起與雞俱興早臥以避初寒早起以從新爽使志安寧以緩秋刑陽德日減陰慘日增故須神志安寧以緩肅殺之氣收斂神氣使秋氣平無外其志使肺氣清此秋氣之應養收之道也曰收斂曰無外皆秋氣之應養收之道逆之則傷肺冬為飧泄奉藏者少肺金主秋秋失其養故傷肺肺傷則腎失其主故當冬令而為飧泄飧泄者水穀不分腎主二便失封藏之職故也冬三月此謂閉藏陽氣伏藏閉塞成冬也水冰地坼無擾乎陽陰盛陽衰君子固密則不傷於寒即無擾乎陽也早臥晚起必待日光所以避寒也即養藏也使志若伏若匿若有私意若已有得曰伏曰匿曰私曰得皆退藏於密法閉藏之本也去寒就溫無泄皮膚使氣亟奪去寒就溫所以養陽無使泄奪所以奉藏真氏曰閉藏不密溫無霜雪則來年陽氣無力五穀不登人身應天地可不奉時耶此冬氣之應養藏之道也逆之則傷腎春為痿厥奉生者少水歸冬旺冬失所養則腎傷而肝木失主肝主筋故當春令筋病為痿冬不能藏則陽虛為厥冬藏既逆承氣而為春生者少矣天氣清靜光明者也靜當作淨清陽之氣淨而不雜天之體也居上而不亢下濟而光明天之用也藏德不止故不下也藏德者藏其高明而不肯自以為高明也不止者健運不息也惟藏而不止雖下降而實不之下曷嘗損其居上之尊乎故曰不下也天明則日月不明邪害空竅惟天藏德不自為用故日月顯明以表造化使天不藏德而自露其光明則日月無以藉之生明大明見者小明滅矣此喻身中元本不藏發皇於外明中空而邪湊也陽氣者閉塞地氣者冒明天氣自用則孤陽上亢而閉塞乎陰氣地氣隔絶而冒蔽乎光明矣雲霧不精則上應白露不下地氣上為雲霧天氣下為雨露上下痞隔則地氣不升而云霧不得輸精於上天氣不降而雨露不得施布於下人身上焦如霧膻中氣化則通調水道下輸膀胱氣化不及州都則水道不通猶之白露不降矣交通不表萬物命故不施不施則名木多死獨陽不生獨陰不成若上下不交則陰陽乖而生道息不能表見於萬物之命故生化不施而名木多死惡氣不發風雨不節白露不下則菀稿不榮惡氣不發濁氣不散也風雨不節氣候乖亂也白露不下陰精不降也即不表不施之義也菀稿不榮言草木抑菀枯槁不能發榮即名木多死之義也上文言天地不交此則專言天氣不降也賊風數至暴雨數起天地四時不相保與道相失則未央絶滅陰陽不和賊風暴雨數為侵侮生長收藏不保其常失陰陽慘舒自然之道矣央中半也未及中半而早已絶滅矣惟聖人從之故身無奇病萬物不失生氣不竭從之者法天地四時也存神葆真以從其藏德勇猛精勤以從其不止收視返聽以從其不自明通任會督以從其陰陽之升降則合乎常經尚安得有奇病萬物不失與時偕行生氣滿乾坤也不竭者無未央絶滅之患也愚按四時者陰陽之行也刑德者四時之合也春凋秋榮冬雷夏雪刑德易節賊氣至而災夫德始於春長於夏刑始於秋流於冬刑德不失四時如一刑德離鄉時乃逆行故不知奉若天時非尊生之典也是以天真論曰調於四時曰分別四時四氣者天地之恆經調神者修煉之要則故春夏養陽秋冬養陰以從其根根者人本於天天本於道道本自然此皆治未病之方養生者所切亟也陰陽應象大論曰能知七損八益則二者可調不知用此則早衰之節也二者陰陽也七為少陽之數八為少陰之數七損者陽消也八益者陰長也陰陽者生殺之本始生從乎陽陽懼其消也殺從乎陰陰懼其長也能知七損八益察其消長之機用其扶抑之術則陽常盛而陰不乘二者可以調和常體春夏之令永獲少壯康強是真把握陰陽者矣不知用此則未央而衰用者作用也如復卦一陽生聖人喜之則曰不遠復無祗悔元吉姤卦一陰生聖人謹之則曰繫於金柅貞吉有攸往見凶羸豕孚蹢躅此即仙家進陽火退陰符之妙用也朱紫陽曰老子言治人事天莫若嗇夫惟嗇是謂早服早服是謂重積德早服者言能嗇則不遠而復便在此也重積德言先有所積而復養以嗇是又加積之也此身未有所損而又加以嗇養是謂早服而重積若損而後養僅足以補其所損不得謂之重積矣知此則七陽將損八陰將益便早為之所陽氣不傷陰用不張庶調燮陰陽造化在手之神用也華元化曰陽者生之本陰者死之基陰宜常損陽宜常益順數者生順陰者滅數語可作七損八益注疏年四十而陰氣自半也起居衰矣二十為少陽三十為壯陽東垣云行年五十以上降氣多而升氣少降者陰也升者陽也由是則四十之時正升陽之氣與降陰之氣相半陽勝陰則強陰勝陽則衰陰陽相半衰兆見矣年五十體重耳目不聰明矣陽氣者輕而善運陰氣者重而難舒五十陰盛故體重也陽主通達陰主閉塞故耳不聰陽為顯明陰為幽暗故目不明年六十陰痿氣大衰九竅不利下虛上實涕泣俱出矣陽氣大衰所以陰痿也九竅不利者陽氣不充不能運化也下虛者少火虛也上實者陰乘陽也涕泣俱出陽衰不能攝也故曰知之則強不知則老知七損八益而調之則強不知則陰漸長而衰老故同出而名異耳同出者陰與陽也名異者強與老也智者察同愚者察異智者洞明陰陽之故故曰察同愚者徒知強老之形故曰察異愚者不足智者有餘有餘則耳目聰明身體輕強老者復壯壯者益治愚者陰長日就衰削故不足智者陽生日居強盛故有餘有餘則聰明輕健雖既老而復同於壯壯者益治即老子早服重積之說也是以聖人為無為之事樂恬憺之能無為者自然之道也恬淡者清靜之樂也老子之無為而無不為莊子之樂全得大是也從欲快志於虛無之守故壽命無窮與天地終從欲者如孔子之從心所欲也快志即大學之自慊也至虛極守靜篤虛無之守也天下之受傷者實也有也與虛無同體不受壞矣故壽命無窮與天地終愚按陽者輕清而無象陰者重濁而有形長生之術必曰虛無得全於陽也故仙真之用在陰盡陽純仙真之號曰純陽全陽皆以陽為要也中和集云大修行人分陰未盡則不仙一切凡人分陽未盡則不死明乎此而七損八益灼然不疑矣遺篇刺法論曰腎有久病者可以寅時面向南淨神不亂思閉氣不息七遍以引頸咽氣順之如咽甚硬物如此七遍後餌舌下津令無數腎為水臟以肺金為母肺金主氣咽氣者母來顧子之法也咽津者同類相親之道也人生於寅寅為陽旺之會陽極於午午為嚮明之方神不亂思者心似太虛靜定凝一也閉氣不息者止其呼吸氣極則微微吐出不令聞聲七遍者陽數也引頸者伸之使直氣易下也如咽甚硬物者極力咽之汨汨有聲以意用力送至丹田氣海氣為水母氣足則精自旺也餌舌下津者為命門在兩腎之間上通心肺開竅於舌下以生津古人制活字從水從舌者言舌水可以活人也舌字從千從口言千口水成活也津與腎水原是一家咽歸下極重來相會既濟之道也仙經曰氣是添年藥津為續命芝世上漫忙兼漫走不知求我更求誰氣為水母水為命根勤而行之可以長生悟真篇曰咽津納氣是人行有藥方能造化生爐內若無真種子猶將水火煮空鐺此言虛極靜篤精養靈根氣養神真種子也愚按素問靈樞各九卷何字非尊生之訣茲所摘者不事百草而事守一不尚九候而尚三奇蓋觀天之道執天之行進百年為萬古尊生之道於是為大矣因知不根於虛靜者即是邪術不歸於易簡者即是旁門誠能於此精求則道德五千丹經五卷豈復有餘蘊哉二陰陽陰陽應象大論曰陰陽者天地之道也太極動而生陽靜而生陰天主於動地主於靜易曰一陰一陽之謂道陰陽者本道體以生道者由陰陽而顯萬物之綱紀總之為綱大德敦化也紛之為紀小德川流也變化之父母經曰物生謂之化物極謂之變易曰在天成象在地成形變化見矣朱子曰變者化之漸化者變之成陰可變為陽陽可變為陰然變化雖多靡不統於陰陽故為父母生殺之本始陰陽交則物生陰陽隔則物死陽來則物生陰至則物死萬物之生殺莫不以陰陽為本始也神明之府也變化不測之謂神品物流形之謂明府者言變化流形皆從此出也治病必求於本人之疾病雖非一端然而或屬虛或屬實或屬寒或屬熱或在氣或在血或在臟或在腑皆不外於陰陽故知病變無窮而陰陽為之本經曰知其要者一言而終是也但明虛實便別陰陽然疑似之間大難剖別如至虛有盛候反瀉含冤大實有羸狀誤補益疾陰症似陽清之者必敗陽症似陰溫之者必亡氣主煦之血主濡之氣藥有生血之功血藥無益氣之理病在腑而誤攻其臟謂之引賊入門病在臟而誤攻其腑譬之隔靴搔癢洞察陰陽直窮病本庶堪司命若疑似之際混而弗明攻補之間畏而弗敢實實虛虛之禍尚忍言哉故積陽為天積陰為地陰靜陽躁積者匯萃之稱也合一切之屬於陽者莫不本乎天合一切之屬於陰者莫不本乎地陰主靜陽主躁其性然也陽生陰長陽殺陰藏陽之和者為發育陰之和者為成實故曰陽生陰長此陰陽之治也陽之亢者為焦枯陰之凝者為封閉故曰陽殺陰藏此陰陽之亂也天元紀大論曰天以陽生陰長地以陽殺陰藏夫天為陽陽主於升升則向生故曰天以陽生陰長陽中有陰也地為陰陰主於降降則向死故曰地以陽殺陰藏陰中有陽也此言歲紀也上半年為陽升天氣主之故春生夏長下半年為陰降地氣主之故秋收冬藏陽不獨立得陰而後成如發生賴於陽和而長養由乎雨露故曰陽生陰長陰不自專因陽而後行如閉藏因於寒冽而肅殺出乎風霜故曰陽殺陰藏按三說俱通故並存之第二則本乎經文尤為確當愚意萬物皆聽命於陽而陰特為之順承者也陽氣生旺則陰血賴以長養陽氣衰殺則陰血無由和調此陰從陽之至理也陽化氣陰成形陽無形故化氣陰有質故成形寒極生熱熱極生寒冬寒之極將生春夏之熱冬至以後自復而之乾也夏熱之極將生秋冬之寒夏至以後自姤而之坤也寒氣生濁熱氣生清寒屬陰故生濁熱屬陽故生清清氣在下則生飧泄濁氣在上則生䐜脹清陽主升陽陷於下而不能升故為飧泄完穀不化也濁陰主降陰逆於上而不能降故為䐜脹胸膈脹滿也清陽為天濁陰為地地氣上為云天氣下為雨此以下明陰陽之升降天人一理也陰在下者為精精即水也精升則化為氣云因雨而出也陽在上者為氣氣即云也氣降即化為精雨由云而生也自下而上者地交於天故地氣上為云自上而下者天交於地故天氣下為雨就天地而言謂之雲雨就人身而言謂之精氣人身一小天地詎不信然故清陽出上竅濁陰出下竅上有七竅耳目口鼻也下有二竅前陰後陰也清陽發腠理濁陰走五臟清陽實四肢濁陰歸六腑陽位乎外陰位乎內腠理四肢皆在外者故清陽居之五臟六腑皆在內者故濁陰居之水為陰火為陽水潤下而寒故為陰火炎上而熱故為陽炎上者欲其下降潤下者欲其上升謂之水火交而成既濟火不制其上炎水不禁其就下謂之水火不交而成未濟腎者水也水中生氣即真火也心者火也火中生液即真水也陰中有陽陽中有陰水火互藏陰陽交體此又不可不知者也陽為氣陰為味味歸形形歸氣氣無形而升故為陽味有質而降故為陰味歸形者五味入口生血成形也形歸氣者血皆依賴於氣氣旺則自能生血氣傷而血因以敗也氣歸精精歸化氣者先天之元氣與後天之穀氣並而充身者也肺金主之金施氣以生水水即精也精者坎府之真鉛天一之最先也精施則能化生萬化之本元也精食氣形食味氣為精母味為形本食者子食母乳之義也化生精氣生形萬化之生必本於精形質之生必本於氣味傷形氣傷精味本歸形味或不節反傷形也氣本歸精氣或不調反傷精也精化為氣氣傷於味氣本歸精氣為精母也此雲精化為氣者精亦能生氣也如不好色者氣因以旺也水火互為之根即上文天地雲雨之義也味不節則傷形而氣不免焉如味過於酸肝氣以津脾氣乃絶之類陰味出下竅陽氣出上竅味為陰故下氣為陽故上味厚者為陰薄為陰之陽氣厚者為陽薄為陽之陰味屬陰味厚為純陰味薄為陰中之陽氣屬陽氣厚為純陽氣薄為陽中之陰味厚則泄薄則通氣薄則發泄厚則發熱陰味下行味厚者能泄於下味薄者能通利也陽氣上行故氣薄者能泄於表氣厚者能發熱也壯火之氣衰少火之氣壯壯火食氣氣食少火壯火散氣少火生氣火者陽氣也天非此火不能發育萬物人非此火不能生養命根是以物生必本於陽但陽和之火則生物亢烈之火則害物故火太過則氣反衰火和平則氣乃壯壯火散氣故云食氣少火生氣故云食火陽氣者身中溫暖之氣也此氣絶則身冷而斃矣運行三焦熟腐五穀疇非真火之功是以內經諄諄反復欲人善養此火但少則壯壯則衰特須善為調劑世之善用苦寒好行疏伐者詎非岐黃之罪人哉陰勝則陽病陽勝則陰病陽勝則熱陰勝則寒陰陽和則得其平一至有偏勝病斯作矣重寒則熱重熱則寒陰陽之變水極則似火火極則似水陽盛則隔陰陰盛則隔陽故有內真寒而外假熱內真熱而外假寒之症不察其變妄輕投劑如水益深如火益熱雖有智者莫可挽救矣寒傷形熱傷氣寒屬陰形亦屬陰故寒則形消也熱為陽氣亦為陽故熱則氣散也氣傷痛形傷腫氣喜宣通氣傷則壅閉而不通故痛形為質象形傷則稽留而不化故腫故先痛而後腫者氣傷形也先腫而後痛者形傷氣也氣先傷而後及於形氣傷為本形傷為標也形先傷而後及於氣形傷為本氣傷為標也喜怒傷氣寒暑傷形舉喜怒而悲恐憂統之矣內傷人情如喜則氣緩怒則氣上悲則氣消恐則氣下憂則氣結故曰傷氣舉寒暑而風濕燥統之矣外傷天氣如風勝則動熱勝則腫燥勝則乾寒勝則浮濕勝則瀉故曰傷形天不足西北故西北方陰也而人右耳目不如左明也地不滿東南故東南方陽也而人左手足不如右強也天為陽西北陰方故天不足西北地為陰東南陽方故地不滿東南日月星辰天之四象猶人之有耳目口鼻故耳目之左明於右以陽勝於東南也水火金木地之四體猶人之有皮肉筋骨故手足之右強於左以陰強於西北也陽之汗以天地之雨名之汗出從表陽也而本於陰水之屬故以天地之雨應之雨雖屬陰非天之陽氣降則不雨也知雨之義者知汗之故矣陽之氣以天地之疾風名之氣為陽陽勝則氣逆喘急如天地之疾風陽氣鼓動也金匱真言論曰平旦至日中天之陽陽中之陽也日中至黃昏天之陽陽中之陰也合夜至雞鳴天之陰陰中之陰也雞鳴至平旦天之陰陰中之陽也子午卯酉天之四正也平旦至日中自卯至午也日中至黃昏自午至酉也合夜至雞鳴自酉至子也雞鳴至平旦自子至卯也以一日分四時則子午當二至卯酉當二分日出為春日中為夏日入為秋夜半為冬也夫言人之陰陽則外為陽內為陰以表裡言言人身之陰陽則背為陽腹為陰以前後言言人身之臟腑中陰陽則臟者為陰腑者為陽肝心脾肺腎五臟皆為陰膽胃大腸小腸膀胱三焦六腑皆為陽五臟屬裡藏精氣而不瀉故為陰六腑屬表傳化物而不藏故為陽故背為陽陽中之陽心也背為陽陽中之陰肺也腹為陰陰中之陰腎也腹為陰陰中之陽肝也腹為陰陰中之至陰脾也老子曰負陰而抱陽是以腹為陽背為陰也內經乃以背為陽腹為陰何也邵子曰天之陽在南故日處之地之剛在北故山處之然則老子之說言天象也內經之說言地象也況陽經行於背陰經行於腹人身臟腑之形體本為地象也第考伏羲六十四卦方圓二圖其義顯然夫圓圖象天陽在東南方圖象地陽在西北可以洞然無疑矣心肺為背之陽肝脾腎為腹之陰何也心肺在膈上連近於背故為背之二陽臟肝脾腎在膈下附近於腹故為腹之三陰臟然陽中又分陰陽者心象人身之日故為陽中之陽肺象人身之天天體雖陽色玄而不自明包藏陰德比之太陽有間故肺為陽中之陰陰中又分陰陽者腎屬水故為陰中之陰肝屬木故為陰中之陽脾屬坤土故為陰中之至陰也六十四卦方圓二圖圓圖象天乾居東南坤居西北方圖象地乾居西北坤居東南生氣通天論曰陽氣者若天與日失其所則折壽而不彰故天運當以日光明此明人生全賴乎陽氣也日不明則天為陰晦陽不固則人為夭折皆陽氣之失所者故天不自明明在日月月體本黑得日乃明此天運當以日光明也太陽在午則為晝而日麗中天顯有象之神明離之陽在外也太陽在子則為夜而火伏水中涵無形之元氣坎之陽在內也天之運行惟日為本天無此日則晝夜不分四時失序晦冥幽暗萬物不彰矣在於人者亦惟此陽氣為要苟無陽氣孰分清濁孰布三焦孰為呼吸孰為運行血何由生食何由化與天之無日等矣欲保天年其可得乎內經一百六十二篇惟此節發明天人大義最為切要讀者詳之凡陰陽之要陽密乃固兩者不和若春無秋若冬無夏因而和之是謂聖度陰主內守陽主外護陽密於外則邪不能侵而陰得以固於內也不和者偏也偏於陽若有春而無秋偏於陰若有冬而無夏和之者瀉其太過補其不足俾無偏勝聖人之法度也故陽強不能密陰氣乃絶陽密則陰固陽強而亢豈能密乎陰氣被擾將為煎厥而竭絶矣陰平陽祕精神乃治陰血平靜於內陽氣祕密於外陰能養精陽能養神精足神全命之曰治五常政大論曰陰精所奉其人壽陽精所降其人夭岐伯本論東南陽方其精降下而多夭西北陰方其精向上而多壽余嘗廣之此陰陽之至理在人身中者亦然血為陰雖肝藏之實腎經真水之屬也水者先天之本也水旺則陰精充而奉上故可永年則補腎宜急也氣屬陽雖肺主之實脾土飲食所化也土者後天之本也土衰則陽精敗而下陷故當夭折則補脾宜亟也先哲云水為天一之元土為萬物之母千古而下獨薛立齊深明此義多以六味地黃丸壯水為奉上之計兼以補中益氣湯扶土為降下之防蓋洞窺升降之微深達造化之旨者歟愚按醫經充棟不越於陰陽誠於體之臟腑腹背上下表里脈之左右尺寸浮沉遲數時令之春夏秋冬歲運之南政北政察陰陽之微而調其虛實則萬病之本咸歸掌握萬卷之富只在寸中不亦約而不漏簡而可據乎三色診脈要精微論曰夫精明五色者氣之華也精明見於目五色顯於面皆氣之華也言氣而血在其中矣赤欲如白裹朱不欲如赭白欲如鵝羽不欲如鹽青欲如蒼璧之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如重漆色不欲如地蒼五色之欲者皆取其潤澤五色之不欲者皆惡其枯槁也五色精微象見矣其壽不久也此皆五色精微之象也凶兆既見壽不久矣夫精明者所以視萬物別白黑審長短以長為短以白為黑如是則精衰矣臟腑之精氣皆上朝於目而為光明故曰精明若精明不能上奉則顛倒錯亂豈能保其生耶靈樞五色篇曰明堂者鼻也闕者眉間也庭者顏也蕃者頰側也蔽者耳門也其間欲方大去之十步皆見於外如是者壽必中百歲庭者天庭也俗名額角蕃蔽者屏蔽四旁也十步之外而部位顯然則方大可知故壽可百歲也明堂骨高以起平以直五臟次於中央六腑挾其兩側首面上於闕庭王宮在於下極五臟安於胸中真色以致病色不見明堂潤澤以清五臟之候皆在中央六腑之候皆在四旁次者居也挾者附也下極居兩目之中心之部也心為君主故稱王宮若五臟安和正色自顯明堂必清潤也五色之見也各出其色部部骨陷者必不免於病矣其色部乘襲者雖病甚不死矣五色之見各有部位若有一部骨弱陷下之處則邪乘之而病若色部雖有變見但得彼此生王有乘襲而無克賊者病雖甚不死矣青黑為痛黃赤為熱白為寒此言五色之所主也其色粗以明沉夭者為甚其色上行者病益甚其色下行如雲徹散者病方已粗者明爽之義沉夭者晦滯之義言色貴明爽若晦滯者為病甚也色上行者濁氣方升故病甚下行者濁氣已退故病已五色各有藏部有外部有內部也色從外部走內部者其病從外走內其色從內走外者其病從內走外病生於內者先治其陰後治其陽反者益甚其病生於陽者先治其外後治其內反者益甚五色各有藏部言臟而腑在其中矣外部者六腑之表六腑挾其兩側也內部者五臟之裡五臟次於中央也凡病色先起外部而後及內部者其病自表入里是外為本而內為標當先治其外後治其內若先起內部而後及外部者其病自里出表是陰為本而陽為標當先治其陰後治其陽若反之者皆為誤治病必轉甚矣常候闕中薄澤為風沖濁為痹在地為厥此其常也各以其色言其病闕中眉間也肺之部也風病在陽皮毛受之故色薄而澤痹病在陰肉骨受之故色沖而濁厥逆為寒濕之變病起於下故色之先於地地者相家所謂地閣即巨分巨屈之處也大氣入於臟腑者不病而卒死大氣者大邪之氣也如水色見於火部火色見於金部之類此元氣大虛賊邪已至雖不病必卒然而死矣赤色出兩顴大如拇指者病雖小愈必卒死黑色出於庭大如拇指必不病而卒死形如拇指最凶之色赤者出於顴顴者應在肩亦為肺部火色剋金病雖愈必卒死天庭處於最高黑者干之是腎絶矣雖不病必卒死也庭者首面也天庭處於最高應首面之有疾闕上者咽喉也闕上者眉心之上也應咽喉之有疾闕中者肺也闕中者正當兩眉之中也色見者其應在肺下極者心也下極者眉心之下也相家謂之山根心居肺下故下極應心直下者肝也下極之下為鼻柱相家謂之年壽肝在心之下故直下應肝肝左者膽也膽附於肝之短葉故肝左應膽而在年壽之左右也下者脾也年壽之下相家謂之準頭亦名土星本經謂之面王又名明堂準頭居面之中央故屬土應脾方上者胃也準頭兩旁為方上即迎香之上鼻隧是也相家謂之蘭臺廷尉與胃為表裡脾居中而胃居外故方上應胃中央者大腸也人中外五分迎香穴大腸之應也亦在面之中故曰中央挾大腸者腎也挾大腸迎香穴者頰之上也四臟皆一惟腎有兩四臟居腹惟腎附脊故四臟次於中央而腎獨應於兩頰當腎者臍也腎與臍對故當腎之下應臍面王以上者小腸也面王鼻準也小腸為腑應挾兩側故面王之上兩顴之內小腸之應也面王以下者膀胱子處也面王以下者人中也乃膀胱子處之應子處者子宮也凡人人中平淺而無髭者多主無子婦人亦以人中深長者善産育此以上皆五臟六腑之應也顴者肩也此下皆言肢節之應也顴為骨之本居中部之上故以應肩顴後者臂也臂接於肩故顴後以應臂臂下者手也目內眥上者膺乳也目內眥上者闕下兩旁也胸兩旁高處為膺膺乳者應胸前也挾繩而上者背也頰之外曰繩身之後曰背故背應於挾繩之上循牙車以下者股也牙車牙床也牙車以下主下部故以應股中央者膝也中央者牙車之中央也膝以下者脛也當脛以下者足也脛次於膝足接於脛以次而下也巨分者股里也巨分者口旁大紋處也股里者股之內側也巨闕者膝臏也巨闕頰下曲骨也膝臏者膝蓋骨也此蓋統指膝部而言各有部分有部分用陰和陽用陽和陰當明部分萬舉萬當部分既明陰陽不爽陽亢則滋其陰謂之用陰和陽陰寒則補其火謂之用陽和陰故明部分而施治法萬舉萬當也能別左右是謂大道男女異位故曰陰陽審察澤夭謂之良工陽左陰右左右者陰陽之道路也故能別左右是為大道男女異位者男子左為逆右為從女子右為逆左為從故曰陰陽陰陽既辨然後審其色之潤澤枯夭以決死生醫之良也沉濁為內浮澤為外色之沉濁晦滯者為里色之浮澤光明者為表黃赤為風青黑為痛白為寒黃而膏潤為膿赤甚者為血痛甚為攣寒甚為皮不仁凡五色之見於面者可因是而測其病矣痛甚即青黑之極也寒甚即白之極也五色各見其部察其浮沉以知淺深察其澤夭以觀成敗察其散摶音團以知遠近視色上下以知病處色之浮者病淺色之沉者病深潤澤者有成枯夭者必敗散而不聚者病近摶而不散者病遠上下者即前臟腑肢節之見於面者也色明不粗沉夭為甚不明不澤其病不甚粗者顯也言色之光明不顯但見沉滯枯夭病必甚也若雖不明澤而不至於沉夭者病必不甚也其色散駒駒然未有聚其病散而氣痛聚未成也駒馬之小者未裝鞍轡散而不聚也譬色之散而無定者病亦散而無堅積聚也即有痛者不過因無形之氣耳腎乘心心先病腎為應色皆如是腎乘心者水邪剋火也心先病於內而腎之色則應於外如黑色見於下極是也不惟心腎諸臟皆然此舉一以例其餘也男子色在於面王為小腹痛下為卵痛其圜直為莖痛高為本下為首狐疝㿉陰之屬也面王上應有上字面王上為小腸下為膀胱子處卵者睪丸也圜直指人中水溝穴也人中有邊圜而直者故人中色見主陰莖作痛在人中上半者曰高為莖根痛在人中下半者為莖頭痛凡此皆狐疝㿉陰之病也㿉即㿗也女子在於面王為膀胱子處之病散為痛摶為聚方圓左右各如其色形其隨而下至胝為淫有潤如膏狀為暴食不潔面王下宜有下字面王下為人中主膀胱子處色散為痛無形之氣滯也色摶為聚有形之血凝也積之或方或圓或左或右各如其外見之形若其色從下行而至尾骶則為浸淫帶濁有潤如膏之物此症多因暴食不潔所致不潔猶言不節非汙穢之謂也或多食冷物或多食熱物一切非宜之物皆是也色者青黑赤白黃皆端滿有別鄉別鄉赤者其色亦大如榆莢在面王為不日五色皆宜端滿端者正色也滿者充潤也別鄉猶言它鄉即別部位也如赤者心色應見於兩目之間是其本鄉今見於面王是別鄉矣不日者不日而愈也火色見於土位是其相生之鄉也此舉赤色為例而五色繆見者皆可類推矣其色上鋭首空上向下鋭下向在左右如法邪色之見各有所向其尖鋭之處是乘虛所犯之方故上鋭者以首虛故上向也下鋭亦然其在左右者皆同此法五臟生成論曰面黃目青面黃目赤面黃目白面黃目黑者皆不死黃者中央土之正色五行以土為本胃氣猶在故不死也面青目赤面赤目白面青目黑面黑目白面赤目青皆死也色中無黃則胃氣已絶故皆死也愚按望聞問切謂之四診而望色居四診之先未有獨憑一脈可以施療者經曰切脈動靜而視精明察五色觀五臟有餘不足六腑強弱形之盛衰以此參伍決死生之分又曰形氣相得謂之可治色澤以浮謂之易已又曰能合色脈可以萬全仲景嘗以明堂闕庭盡不見察為世醫咎好古嘗論治婦人不能行望色之神為病家咎則色固不要歟而醫顧可忽歟四脈診脈要精微論曰診法常以平旦陰氣未動陽氣未散飲食未進經脈未盛絡脈調勻氣血未亂故乃可診有過之脈人身營衛之氣晝則行於陽分夜則行於陰分至平旦皆會於寸口故診脈當以平旦為常也陰氣正平而未動陽氣將盛而未散飲食未進虛實易明經脈未盛絡脈調勻氣血未常因動作而擾亂乃可診有過之脈過者病也切脈動靜而視精明察五色觀五臟有餘不足六腑強弱形之盛衰以此參伍決死生之分切者切近也手按近體也切脈之動靜診陰陽也視目之精明診神氣也察五色以觀臟腑之虛實審形體以別病勢之盛衰以此數者與脈參伍推求則陰陽表裡虛實寒熱自無遁狀可以決死生之分矣不齊之謂參剖其異而分之也相類之謂伍比其同而合之也脈惟一端診有數法此醫家之要道也尺內兩傍則季脅也關前曰寸關後曰尺季脅小肋也在脅之下為腎所近故有季脅之下皆尺內主之尺外以候腎尺裡以候腹尺外尺脈前半部也尺裡尺脈後半部也前以候陽後以候陰人身以背為陽腎附於背故外以候腎腹為陰故里以候腹而大小腸膀胱命門皆在其中矣諸部言左右此獨不分者以兩尺皆主乎腎也中附上左外以候肝內以候膈中附上者言附尺之上而居乎中即關部也左外言左關之前半部內者言左關之後半部也肝為陰中之陽而亦附近於背故外以候肝內以候膈舉膈而中焦之膈膜膽腑皆在其中矣右外以候胃內以候脾右關前半候胃右關後半候脾脾胃皆處中州而以表裡言之則胃為陽脾為陰故外以候胃內以候脾上附上右外以候肺內以候胸中上附上者上而又上則寸部也五臟之位肺處至高故右寸前以候肺右寸後以候胸中言胸中而膈膜之上皆是矣左外以候心內以候膻中左寸之前以候心左寸之後以候膻中膻中者即心胞絡也按靈蘭祕典有膻中而無胞絡以膻中為臣使之官喜樂出焉靈樞敘經脈有胞絡而無膻中而曰動則喜笑不休正與喜樂出焉之句相合夫喜笑屬火之司則知膻中與心應即胞絡之別名也平人氣象論曰人一呼脈再動一吸脈亦再動呼吸定息脈五動閏以太息命曰平人平人者不病也動至也一呼再功一吸再動一呼一吸合為一息是一息四至也呼吸定息脈五動者當其閏以太息之時也歷家三歲一閏五歲再閏人應天道故三息閏一太息五息再閏一太息太息者長息也此言平人無病之脈當以四至為準若五至便為太過惟當閏以太息之時故得五至苟非太息仍四至也人一呼脈一動一吸脈一動曰少氣呼吸各一動是一息二至也二至為遲遲主寒疾夫氣為陽氣虛則陽虛故曰少氣人呼脈三動一吸脈三動而躁尺熱曰病溫尺不熱脈滑曰病風脈澀曰痹呼吸各三動是一息六至也六至為數躁者數之義也尺熱者尺中六至也病溫猶言患熱非傷寒之溫病也左尺為水而數則水涸而熱也右尺為火而數則火炎而熱也故咸曰病溫尺不數而諸脈滑者陽邪盛也故當病風澀為血凝氣滯故當病痹也人呼脈四動以上曰死脈絶不至曰死乍疏乍數曰死一呼四動則一息八至矣況以上乎故知必死脈絶不至則營衛已絶乍疏乍數則氣血潰亂不死安待靈樞根結篇曰一日一夜五十營以營五臟之精不應數者名曰狂生營者運也人之經脈運行於身者一日一夜凡五十周以運五臟之精凡周身上下前後左右計二十七脈共長十六丈二尺人之宗氣積於胸中主呼吸而行經絡一呼氣行三寸一吸氣行三寸呼吸定息脈行六寸以一息六寸推之則一晝一夜凡一萬三千五百息通計五十周於身脈八百一十丈其有太過不及則不應此數矣狂生者妄生也其生未可保也所謂五十營者五臟皆受氣持其脈口數其至也五十營者五臟所受之氣持寸口而數其至數則虛實可考也五十動而不一代者以為常也以知五臟之期當作氣豫之短期者乍數乍疏也以為常者經常之脈也可因以知五臟之氣也若乍數乍疏則陰陽乖亂死期近矣短者近也三部九候論曰獨小者病獨大者病獨疾者病獨遲者病獨熱者病獨寒者病獨陷下者病此言七診之法也獨者謂於三部九候之中以其獨異於諸部者而推其病之所在也方盛衰論曰形氣有餘脈氣不足死脈氣有餘形氣不足生此言脈重於形氣也形氣有餘外貌無恙也脈氣不足內臟已傷也故死若形雖衰而脈未敗根本猶存尚可活也故三部九候論曰形肉已脫九候雖調猶死蓋脫則大肉去盡較之不足殆有甚焉脾主肌肉肉脫者脾絶決無生理脈要精微論曰持脈有道虛靜為保虛者心空而無雜想也靜者身靜而不喧動也保而不失此持脈之道也春日浮如魚之遊在波春陽雖動而未全彰故如魚之遊在波也夏日在膚泛泛乎萬物有餘夏氣暢達萬物皆備而無虧缺也泛泛盛滿之貌秋日下膚蟄蟲將去秋金清肅盛者漸斂如蟄蟲之將去而未去也冬日在骨蟄蟲周密君子居室冬令閉藏沉伏在骨如蟄畏寒深居密處君子法天時而居室退藏於密也故曰知內者按而紀之知外者終而始之此六者持脈之大法內言臟氣臟象有位故可按而紀也外言經氣經脈有序故可終而始也明此四時內外六法則病之表裡陰陽皆可灼然明辨故為持脈之大法玉機真藏論曰春脈者肝也東方木也萬物之所以始生也故其氣來軟弱輕虛而滑端直以長故曰弦反此者病端直以長狀如弓弦則有力矣然軟弱輕虛而滑則弦不至於太徑宛然春和之象也其氣來實而強此謂太過病在外其氣來不實而微此謂不及病在中實而強大則不能軟弱輕虛矣不實而微不能端直以長矣皆弦脈之反也故上文曰反此者病外病多有餘內病多不足大抵然也太過則令人善忘忽忽眩冒而巔疾其不及則令人胸痛引背下則兩脅胠滿忘當作怒本神篇曰肝氣虛則恐實則怒氣交變大論曰歲木太過忽忽善怒眩冒巔疾眩者目花也冒者神昏也足厥陰之脈會於巔貫膈布脅故見症乃爾夏脈者心也南方火也萬物之所以盛長也故其氣來盛去衰故曰鉤反此者病鉤義如木之垂枝即洪脈也其來則盛其去則衰陽盛之象其氣來盛去亦盛此謂太過病在外其氣來不盛去反盛此謂不及病在中來盛去盛鉤之過也來不盛去反盛鉤之不及也去反盛者非強盛也凡脈自骨出膚謂之來自膚入骨謂之去太過則令人身熱而膚痛為浸淫其不及則令人煩心上見咳唾下為氣泄太過則陽有餘而病在外故身熱膚痛浸淫者濕熱之甚也不及則君火衰而病在內故為心不足而煩火乘金而咳氣泄者陽氣下陷也秋脈者肺也西方金也萬物之所以收成也故其氣來輕虛以浮來急去散故曰浮反此者病浮者輕虛之別名也來急去散亦是狀浮之象也即毛也其氣來毛而中央堅兩旁虛此謂太過病在外其氣來毛而微此謂不及病在中毛而有力為中央堅毛而無力為微太過則令人逆氣而背痛慍慍然其不及則令人喘呼吸少氣而咳上氣見血下聞病音肺主氣故太過則氣逆背痛慍慍者氣鬱貌不及則氣短而咳氣不歸原故上氣陰虛內損故見血下聞病音者腸鳴泄氣也冬脈者腎也北方水也萬物之所以合藏也故其氣來沉以搏故曰營反此者病營者退藏於密之義也即沉石之義也其氣來如彈石者此謂太過病在外其去如數者此謂不及病在中彈石者堅強之象也如數者非真數也言去之速也太過則令人解㑊脊脈痛而少氣不欲言其不及則令人心懸如病飢䏚中清脊中痛少腹滿小便變解者懈怠而肢體不收也㑊者形跡困倦也脊痛者腎脈所過也邪氣太過則正氣少而不欲言矣心腎不交故心中如飢䏚中者季脅下空軟處腎之所居也腎脈貫脊屬腎絡膀胱故為脊痛腹滿便變諸症脾脈者土也孤臟以灌四旁者也脾屬土土為萬物之母運行水穀變化精微以灌溉於南心北腎東肝西肺故曰四旁孤臟者位居中央寄旺四時之末各十八日四季共得七十二日每季三月各得九十日於九十中除去十八日則每季只七十二日而為五行分旺之數總之五七三百五二五一十共得三百六十日以成一歲也善者不可得見惡者可見善者脾之平脈也脾何以無平脈可見乎土無定位亦無定象古人強名之曰不浮不沉不大不小不疾不徐意思欣欣悠悠揚揚難以名狀此數語者未嘗有定象可指定形可見也不可得見者即難以名狀也惡者即太過不及之病脈也其來如水之流者此謂太過病在外如烏之喙者此謂不及病在中按平人氣象論曰堅鋭如烏之喙如水之流故脾死夫如烏之喙者硬而不和如水之流者散而無紀土德有慚病在不治即所謂惡者可見也平人氣象論曰夫平心脈來纍纍如連珠如循琅玕曰心平夏以胃氣為本連珠琅玕喻其盛滿溫潤即微鉤之義也即胃氣之脈也故曰心平病心脈來喘喘連屬其中微曲曰心病喘喘連屬急數之象也其中微曲鉤多胃少之義也死心脈來前曲後居如操帶鉤曰心死前曲者輕取之而堅大後居者重取之而牢實如持革帶金鉤而沖和之意失矣故曰心死平肺脈來厭厭聶聶如落榆莢曰肺平秋以胃氣為本厭厭聶聶澀之象也如落榆莢毛之象也輕浮和緩為有胃氣此肺之平脈也病肺脈來不上不下如循雞羽曰肺病不上不下亦澀也如循雞羽亦毛也但毛多胃少故曰肺病死肺脈來如物之浮如風吹毛曰肺死如物之浮則無根矣如風吹毛則散亂矣但毛無胃故曰肺死平肝脈來軟弱招招如揭長竿末梢曰肝平春以胃氣為本招招猶迢迢也揭高舉也高揭長竿梢必和軟和緩弦長弦而有胃氣者也為肝之平脈病肝脈來盈實而滑如循長竿曰肝病盈實而滑弦之太過也長竿無梢則失其和緩之意此弦多胃少故曰肝病死肝脈來急益徑如新張弓弦曰肝死徑強急也新張弓弦弦而太過但弦無胃者也故曰肝死平脾脈來和柔相離如雞踐地曰脾平長夏以胃氣為本和柔者悠悠揚揚也相離者不模糊也如雞踐地緩而不迫胃氣之妙也是為脾平病脾脈來實而盈數如雞舉足曰脾病實而盈數強急不和也如雞舉足之象此即弱多胃少為脾之病死脾脈來鋭堅如烏之喙如鳥之距如屋之漏如水之流曰脾死如鳥之喙硬也如鳥之距急也如屋之漏亂也如水之流散也脾氣已絶見此必死平腎脈來喘喘纍纍如鉤按之而堅曰腎平冬以胃氣為本喘喘纍纍如鉤皆心脈之陽也兼之沉石則陰陽和平腎脈之有胃氣者病腎脈來如引葛按之益堅曰腎病引葛者牽連蔓引也按之益堅石多胃少也死腎脈來發如奪索辟辟如彈石曰腎死索而曰奪則互引而徑急矣辟辟如彈石但石無胃矣腎死之診也脈要精微論曰夫脈者血之府也營行脈中故為血府然行是血者是氣為之司也逆順篇曰脈之盛衰者所以候血氣之虛實則知此舉一血而氣在其中即下文氣治氣病義益見矣長則氣治短則氣病氣足則脈長氣虛則脈短數則煩心大則病進心為丙丁之原故數則煩心邪盛則脈滿故大則病進上盛則氣高上盛者寸脈盛也氣高者火亢氣逆也下盛則氣脹下盛者關尺脈盛也邪入於下故為脹滿代則氣衰細則氣少代脈見而氣將絶細脈見而氣不充曰衰則少之甚者也澀則心痛血凝氣滯則脈澀故主心痛渾渾革至如湧泉病進而色弊綿綿其去如弦絶死渾渾者洶湧之貌革脈之至如皮革之堅急也湧泉狀其盛滿也見此脈者病漸增進而色夭不澤也綿綿弦絶則胃氣絶無真臟脈見故死大奇論曰脈至浮合浮合如數一息十至以上是經氣豫不足也微見九十日死此以下皆定死期也浮合者如浮波之合後浪催前泛泛無紀如數者似數而非數也數太過為血熱也如數者血敗也浮合者氣敗也一息十至以上死期大迫此云九十日者誤也十字直衍微見者初見也初見此脈九日當死脈至如火薪然是心精之豫奪也草乾而死脈如火然是火旺過極之脈心經之精氣奪盡矣夏令火旺尚可強支水令草乾陽盡而死矣脈至如散葉是肝氣豫虛也木葉落而死散葉者浮泛無根肝氣虛極也木葉落則金旺而木絶其死宜也脈至如省客省客者脈塞而鼓是腎氣豫不足也懸去棗華而死省客省問之客時來時去者也塞者澀而代也鼓者堅且搏也澀代為精敗堅搏為胃少至於棗華吐則土旺水衰立盡矣脈至如泥丸是胃精豫不足也榆莢落而死泥丸者泥彈之狀動短之脈也主胃中精氣不足榆莢至春深而落木旺之時土必敗矣脈至如橫格是膽豫不足也禾熟而死橫格者長大堅徑木之真臟脈也膽之衰敗也禾熟於秋金王而木乃絶矣脈至如弦縷是胞精豫不足也病善言下霜而死不言可治弦者喻其徑急縷者喻其細小胞者心胞絡也舌為心苗火動則善言冬月飛霜水來剋火而死矣不言則所傷猶淺故可救也脈至如交漆交漆者左右傍至也微見三十日死交漆者模糊而大即瀉漆之義也左右傍至大可知也微者初也月令易而死期至矣脈至如湧泉浮鼓肌中太陽氣豫不足也少氣味韭英而死湧泉者如泉之湧有升無降而浮鼓於肌表之間是足太陽膀胱氣不足也膀胱為三陽而主表也今表實裡虛故為少氣韭英韭花也發於長夏土剋水故死脈至如頽土之狀按之不得是肌氣豫不足也五色先見黑白壘發死上下虛則頽脈來虛大按之不可得正下虛之象也脾主肌肉肌氣即脾氣也黑為水色土敗而木反侮之壘虆同即蓮虆也虆有五而白者發於春木旺之時土其絶矣脈至如懸雍懸雍者浮揣切之益大是十二俞之豫不足也水凝而死懸雍者喉間下垂肉乳也俗名喉嚨花浮揣之而大是有陽無陰孤陽亢上之象十二俞者臟腑十二經所輸也水凝而死者陰氣盛而孤陽絶也脈至如偃刀偃刀者浮之小急按之堅大急五臟菀熱寒熱獨並於腎也如此其人不得坐立春而死偃刀臥刀也浮之小急如刀口也按之堅大急如刀背也重按之腎之應也腎虛則陰消而五臟咸熱雖五臟有郁菀之熱而發為寒熱其原則獨歸併於腎也腎因虧損腰脊痠疼不能起坐冬令水旺未即敗絶遇春乃死也脈至如丸滑不直手不直手者按之不可得也是大腸氣豫不足也棗葉生而死如丸者流利之狀正滑脈也不直手者滑而不應手按之則無也大腸與肺金相為表裡棗葉生於初夏火盛則金絶故當死脈至如華者令人善恐不欲坐臥行立常聽是小腸氣豫不足也季秋而死如華者盛滿而輕浮也小腸與心相為表裡小腸虛則心亦虛故善恐不得坐臥也行立常聽恐懼多而狐疑也丙火墓於戌故當季秋死三部九候論曰形盛脈細少氣不足以息者死形盛者脈亦盛其常也形盛脈細脈不應形矣甚而少氣難以布息死不旋踵形瘦脈大胸中多氣者死形小脈小其常也形瘦脈大既不相應甚而胸中多逆上之氣陰敗陽孤不死安待形氣相得者生身形與脈氣相得如形小脈小形大脈大是也參伍不調者病三以相參伍以相類謂之不調者或大或小或遲或疾或滑或澀不合常度皆病脈也三部九候皆相失者死三部者上中下三部分天地人分胸膈腹也九候者每部有浮中沉三候三部各三合而為九候也或應浮大而反沉細應沉細而反浮大謂之相失而不合於揆度也形肉已脫九候雖調猶死脾主肌肉為臟之本若肌肉脫則脾絶矣九候雖調無益也七診雖見九候皆從者不死七診者獨大獨小獨疾獨遲獨熱獨寒獨陷下也從順也合也脈順四時之令及合諸經之體者雖見七診之脈不至於死陰陽別論曰凡持真臟之脈者肝至懸絶十八日死懸絶者真臟脈見胃氣已無懸懸欲絶也十八日者為木金成數之餘金勝木而死也心至懸絶九日死九日者為火水生成數之餘水勝也肺至懸絶十二日死十二日為金火生成數之餘火勝金也腎至懸絶七日死七日者為水土生數之餘土勝水也脾至懸絶四日死四日者為木生數之餘木勝土也平人氣象論曰婦人手少陰脈動甚者妊子也手少陰心脈也動甚者流利滑動血旺而然也故當妊子陰陽別論曰陰搏陽別謂之有子陰搏陽別言陰脈搏動與陽脈迥別也陰陽二字所包者廣以左右言則左為陽右為陰以部位言則寸為陽尺為陰以九候言則浮為陽沉為陰舊說以尺脈洪實為陰與陽脈迥別似矣然則手少陰脈動甚亦在寸也何取於陽別之旨乎故因會通諸陰陽而後可決也徵四失論曰診病不問其始憂患飲食之失節起居之過度或傷於毒不先言此卒持寸口何病能中妄言作名為粗所窮此言臨脈者必先察致病之因而後參之以脈則陰陽虛實不致淆訛若不問其始是不求其生也如憂患飲食內因也起居過度外因也傷於毒者不內外因也不先察其因而卒持寸口自謂脈神無假於問豈知真假逆從脈病原有不合者倉卒一診安能盡中病情妄言作名欺世賣俗誤治傷生損德不小矣愚按脈者血氣之徵兆也病態萬殊盡欲以三指測其變化非天下之至巧者孰能與於斯許叔微云脈之理幽而難明吾意所解口莫能宣也可以筆墨傳口耳授者皆粗跡也雖然粗者未諳精者從何而出析而言之二十四字猶嫌其略約而歸之浮沉遲數已握其綱所以脈不辨陰陽愈索而愈惑也陰陽之義已見於前陰搏陽別之條又滑伯仁曰察脈須辨上下來去至止不明此六字則陰陽不別也上者為陽來者為陽至者為陽下者為陰去者為陰止者為陰上者自尺上於寸陽生於陰也下者自寸下於尺陰生於陽也來者自骨肉而出於皮膚氣之升也去者自皮膚而還於骨肉氣之降也應曰至息曰止此義至淺而至要行遠自邇登高自卑請事斯語矣五藏象靈蘭祕典論曰心者君主之官神明出焉心者一身之主故為君主之官其藏神其位南有離明之象故曰神明出焉肺者相傅之官治節出焉位高近君猶之宰輔故為相傅之官肺主氣氣調則臟腑諸官聽其節制無所不治故曰治節出焉肝者將軍之官謀慮出焉肝為震卦壯勇而急故為將軍之官肝為東方龍神龍善變化故為謀慮所出膽者中正之官決斷出焉膽性剛直為中正之官剛直者善決斷肝雖勇急非膽不斷也膻中者臣使之官喜樂出焉脹論云膻中者心主之宮城也貼近君主故稱臣使臟腑之官莫非王臣此獨泛言臣又言使者使令之臣如內侍也按十二臟內有膻中而無胞絡十二經內有胞絡而無膻中乃知膻中即胞絡也況喜笑屬火此云喜樂出焉其配心君之府較若列眉矣脾胃者倉廩之官五味出焉胃司納受脾司運化皆為倉廩之官五味入胃脾實轉輸故曰五味出焉大腸者傳道之官變化出焉大腸居小腸之下主出糟粕是名變化傳導小腸者受盛之官化物出焉小腸居胃之下受盛胃之水穀而分清濁水液滲於前糟粕歸於後故曰化物腎者作強之官伎巧出焉腎處北方而主骨宜為作強之官水能化生萬物故曰伎巧出焉三焦者決瀆之官水道出焉上焦如霧中焦如漚下焦如瀆三焦氣治則水道疏通故名決瀆之官膀胱者州都之官津液藏焉氣化則能出矣膀胱位居卑下故名州都之官經曰水穀循下焦而滲入膀胱蓋膀胱有下口而無上口津液之藏者皆由氣化滲入然後出焉舊說膀胱有上口而無下口者非也凡此十二官者不得相失也失則不能相使而疾病作矣故主明則下安以此養生則壽歿世不殆以為天下則大昌主明則十二官皆奉令承命是以壽永推此以治天下則為明君而享至治主不明則十二官危使道閉塞而不通形乃大傷以此養生則殃以為天下者其宗大危戒之戒之君主不明則諸臣曠職或謀不軌自上及下相使之道皆不相通即不奉命也在人身則大傷而命危在朝廷則大亂而國喪矣心為陽中之陽獨尊重之者以陽為一身之主不可不奉之以為性命之根蒂也六節藏象論曰心者生之本神之處也其華在面其充在血脈為陽中之太陽通於夏氣根本發榮之謂生變化不測之謂神心為太陽生身之本也心主藏神變化之原也心主血屬陽而升是以華在面充在血脈也心居上為陽臟又位於南離故為陽中之太陽而通於夏也肺者氣之本魄之處也其華在毛其充在皮為陽中之太陰通於秋氣肺統氣氣之本也肺藏魄魄之舍也肺輕而浮故其華其充乃在皮毛也以太陰之經居至高之分故為陽中之太陰而通於秋氣也腎者主蟄封藏之本精之處也其華在發其充在骨為陰中之少陰通於冬氣位居亥子職司閉藏猶之蟄蟲也腎主水受五臟六腑之精而藏之精之處也髮色黑而為血之餘精足者血充發受其華矣腎之合骨也故充在骨以少陰之經居至下之地故為陰中之少陰通於冬也肝者罷極之本魂之居也其華在爪其充在筋以生血氣其味酸其色蒼此為陽中之少陽通於春氣筋勞曰罷主筋之臟是為罷極之本肝主藏魂非魂之居乎爪者筋之餘充其筋者宜華在爪也肝為血海自應生血肝主春升亦應生氣酸者木之味蒼者木之色木旺於春陽猶未壯故為陽中之少陽通於春氣脾胃大腸小腸三焦膀胱者倉廩之本營之居也名曰器能化糟粕轉味而入出者也其華在唇四白其充在肌其味甘其色黃此至陰之類通於土氣六經皆受水穀故均有倉廩之名血為營水穀之精氣也故為營之所居器者譬諸盛物之器也胃受五穀名之曰入脾與大小腸三焦膀胱皆主出也唇四白者唇之四圍白肉際也唇者脾之榮肌者脾之合甘者土之味黃者土之色脾為陰中之至陰分旺四季故通於土六經皆為倉廩皆統於脾故曰至陰之類凡十臟取決於膽也五臟六腑其為十一臟何以皆取決於膽乎膽為奇恆之府通全體之陰陽況膽為春升之令萬物之生長化收藏皆於此托初稟命也靈樞本輸篇曰肺合大腸大腸者傳道之府心合小腸小腸者受盛之府肝合膽膽者中清之府脾合胃胃者五穀之府腎合膀胱膀胱者津液之府也少陽屬腎腎上連肺故將兩藏此言臟腑各有所合為一表一里也將領也獨腎將兩藏者以手少陽三焦正脈指天散於胸中而腎脈亦上連於肺三焦之下腧屬膀胱而膀胱為腎之合故三焦者亦合於腎也夫三焦為中瀆之府膀胱為津液之府腎以水藏而領水府故腎得兼將兩藏本藏論曰腎合三焦膀胱是也三焦者中瀆之府也水道出焉屬膀胱是孤之府也中瀆者身中之溝瀆也水之入於口而出於便者必歷三焦故曰中瀆之府水道出焉在本篇曰屬膀胱在血氣形志篇曰少陽與心主為表裡蓋在下者為陰屬膀胱而合腎水在上者為陽合胞絡而通心火三焦所以際上極下象同六合而無所不包也十二臟中惟三焦獨大諸臟無與匹者故稱孤府難經及叔和啓玄皆以三焦有名無形已為誤矣陳無擇創言三焦有形如脂膜更屬不經靈樞曰密理厚皮者三焦厚粗理薄皮者三焦薄又曰勇士者三焦理橫怯士者其焦理縱又曰上焦出於胃上口並咽以上貫膈而布胸中中焦亦並胃中出上焦之後泌糟粕蒸精液化精微而為血下焦者別回腸注於膀胱而滲入焉水穀者居於胃中成糟粕下大腸而成下焦又曰上焦如霧中焦如漚下焦如瀆既曰無形何以有厚薄何以有縱有橫何以如霧如漚如瀆何以有氣血之別耶金匱真言論曰東方青色入通於肝開竅於目藏精於肝其病發驚駭其味酸其類草木其畜雞易曰巽為雞東方風木之畜也其穀麥麥成最早故應東方春氣其應四時上為歲星是以春氣在頭也春氣上升其音角其數八易曰天三生木地八成之是以知病之在筋也其臭臊禮月令云其臭膻膻即臊也南方赤色入通於心開竅於耳陰陽應象大論曰心在竅為舌腎在竅為耳此云開竅於耳則耳兼心腎也藏精於心故病在五臟心為五臟之君心病則五臟應之其味苦其類火其畜羊五常政大論曰其畜馬此云羊者或因午未俱在南方耳其谷黍黍色赤宜為心家之谷五常政大論云其穀麥二字相似疑誤也其應四時上為熒惑星是以知病之在脈也其音徵其數七地二生火天七成之其臭焦焦為火氣所化中央黃色入通於脾開竅於口藏精於脾故病在舌本脾之脈連舌本散舌下其味甘其類土其畜牛牛屬醜而色黃易曰坤為牛其谷稷稷小米也粳者為稷糯者為黍為五穀之長色黃屬土其應四時上為鎮星是以知病之在肉也其音宮其數五其臭香西方白色入通於肺開竅於鼻藏精於肺故病在背肺雖在胸中實附於背也其味辛其類金其畜馬肺為乾象易曰乾為馬其谷稻稻色白故屬金其應四時上為太白星是以知病之在皮毛也其音商其數九地四生金天九成之其臭腥北方黑色入通於腎開竅於二陰藏精於腎故病在溪氣穴論云肉之大會為谷肉之小會為溪溪者水所流注也其味鹹其類水其畜彘易曰坎為水其谷豆黑者屬水其應四時上為辰星是以知病之在骨也其音羽其數六天一生水地六成之其臭腐腐為水氣所化禮月令云其臭朽朽即腐也陰陽應象大論曰東方生風風生木木生酸酸生肝肝生筋筋生心木生火也肝主目其在天為玄玄者天之本色此總言五臟不專指肝也在人為道道者生天生地生物者也肝主生生之令故比諸道在地為化化生化也自無而有自有而無總名曰化肝主春生故言化耳化生五味道生智生意不窮智所由出玄生神玄冥之中不存一物不外一物莫可名狀強名曰神按在天為玄至此六句以下四臟皆無獨此有之以春貫四時元統四德蓋兼五行六氣而言非獨指東方也觀天元紀大論有此數語亦總貫五行義益明矣神在天為風飛揚散動周流六虛風之用也六氣之首也在地為木在體為筋在臟為肝在色為蒼在變動為握握者筋之用也在竅為目在味為酸在志為怒怒傷肝悲勝怒悲為肺志金勝木也風傷筋燥勝風燥為肺氣金勝木也酸傷筋辛勝酸辛為肺味金勝木也南方生熱熱生火火生苦苦生心心生血血生脾火生土也心主舌舌為心之官也其在天為熱在地為火在體為脈在臟為心在色為赤在音為徵在聲為笑在變動為憂心有餘則笑不足則憂在竅為舌在味為苦在志為喜喜傷心恐勝喜恐為腎志水勝火也熱傷氣壯火食氣寒勝熱水勝火也苦傷氣苦為心味氣屬金家火剋金也苦為大寒氣為陽主苦則氣不和也咸勝苦咸為腎味水剋火也中央生濕濕生土土生甘甘生脾脾生肉肉生肺土生金也脾主口其在天為濕在地為土在體為肉在臟為脾在色為黃在音為宮在聲為歌在變動為噦在竅為口在味為甘在志為思思傷脾怒勝思木勝土也濕傷肉風勝濕木勝土也甘傷肉酸勝甘木味勝土西方生燥燥生金金生辛辛生肺肺生皮毛皮毛生腎金生水也肺主鼻其在天為燥在地為金在體為皮毛在臟為肺在色為白在音為商在聲為哭悲哀則哭肺之聲也在變動為咳在竅為鼻在味為辛在志為憂金氣燥淒故令人憂憂甚則悲矣憂傷肺悲憂則氣消喜勝憂熱傷皮毛寒勝熱水制火也辛傷皮毛苦勝辛火制金也北方生寒寒生水水生咸咸生腎腎生骨髓髓生肝水生木也腎主耳其在天為寒在地為水在體為骨在臟為腎在色為黑在音為羽在聲為呻在變動為栗寒則戰栗恐則戰栗腎水之象也在竅為耳在味為咸在志為恐恐傷腎恐則足不能行恐則遺尿恐則陽痿是其傷也思勝恐土製水也寒傷血陰陽應象大論云寒傷形血為有形形即血也燥勝寒燥則水涸故勝寒若五行之常宜土濕勝水寒然濕與寒同類不能制也咸傷血甘勝咸土勝水也新校正云在東方曰風傷筋酸傷筋中央曰濕傷肉甘傷肉是自傷也南方曰熱傷氣苦傷氣北方曰寒傷血咸傷血是傷我所勝也西方云熱傷皮毛是所不勝傷己也辛傷皮毛是自傷也五方所傷有此三例不同靈樞本神篇曰天之在我者德也地之在我者氣也德流氣薄而生者也理賦於天者德也形成於地者氣也天地氤氳德下流而氣上薄人乃生焉故生之來謂之精來者所從來也生之來即有生之初也陰陽二氣各有其精精者即天一生水地六成之為五行之最初故萬物初生其來皆水易曰男女媾精萬物化生是也兩精相搏謂之神兩精者陰陽也相搏者交媾也易曰天數五地數五五位相得而各有合周子曰二五之精妙合而凝即兩精相搏也神者至靈至變無形無象奈何得之精搏之後乎天元紀大論曰陰陽不測之謂神易曰知變化之道者其知神之所為乎神者即虛極之本生天生地者也彌滿乾坤無之非是故易曰神無方即天之所以為天地之所以為地者二五妙合之後宛然小天地矣故云隨神往來者謂之魂並精而出入者謂之魄陽神曰魂陰神曰魄人之生也以氣養形以形攝氣氣之神曰魂形之靈曰魄生則魂載於魄魄檢其魂死則魂歸於天魄歸於地魂喻諸火魄喻諸鏡火有光焰物來便燒鏡雖照見不能燒物夫人夢有動作身常靜定動者魂之用靜者魄之體也夫精為陰神為陽魂為陽魄為陰故隨神往來並精出入各從其類也所以任物者謂之心神雖藏於心神無形而體虛心有形而任物君主之官萬物皆任也心有所憶謂之意心已起而未有定屬者意也意之所存謂之志意已決而確然不變者志也因志而存變謂之思志雖定而反復計度者思也因思而遠慕謂之慮思之不已必遠有所慕憂疑輾轉者慮也因慮而處物謂之智慮而後動處事靈巧者智也五者各歸所主之臟而統於心故諸臟為臣使而心為君主心怵惕思慮則傷神神傷則恐懼自失破䐃脫肉毛悴色夭死於冬神藏於心心傷則神不安失其主宰也心者脾之母心虛則脾亦薄肉乃消瘦也毛悴者憔悴也色夭者心之色赤赤欲如白裹朱不欲如赭火衰畏水故死於冬脾愁憂而不解則傷意意傷則悗亂四肢不舉毛悴色夭死於春憂本傷肺今以屬脾者子母相通也憂則氣滯而不運故悗悶也四肢稟氣於胃而不得至經必因於脾乃得稟也故脾傷則四肢不舉脾之色黃黃欲如羅裹雄黃不欲如黃土土衰畏木故死於春肝悲哀動中則傷魂魂傷則狂忘不精不精則不正當人陰縮而攣筋兩脅骨不舉毛悴色夭死於秋悲哀亦肺之志而傷肝者金伐木也肝藏魂魂傷則或為狂亂或為健忘不精者失見精明之常則邪妄而不正也肝主筋故陰縮攣急兩脅者肝之分肝敗則不舉肝色青青欲如蒼璧之澤不欲如藍木衰畏金故死於秋肺喜樂無極則傷魄魄傷則狂狂者意不存人皮革焦毛悴色夭死於夏喜樂屬心而傷肺者火乘金也肺藏魄魄傷則不能鎮靜而狂意不存人者旁若無人也肺主皮故皮革焦也肺色白白欲如鵝羽不欲如鹽金衰畏火故死於夏腎盛怒而不止則傷志志傷則喜忘其前言腰脊不可以俯仰屈伸毛悴色夭死於季夏怒者肝志而傷腎者子母相通也腎藏志志傷則喜忘其前言腰為腎之府脊為腎之路腎傷則不可俯仰屈伸腎色黑黑欲如重漆色不欲如地蒼水畏土故死於季夏恐懼而不解則傷精精傷則骨痠痿厥精時自下此亦腎傷也特傷於本臟之志為異於前耳恐則氣下故精傷腎主骨精傷則骨痠痿者陽之痿厥者陽之衰閉藏失職則不因交感精自下矣經脈別論曰食氣入胃散精於肝淫氣於筋精者食之輕清者也肝主筋故胃家散布於肝則浸淫滋養於筋也食氣入胃濁氣歸心淫精於脈濁者食之厚濁者也心主血脈故食氣歸心則精氣浸淫於脈也脈氣流經經氣歸於肺肺朝百脈輸精於皮毛淫於脈者必流於經經脈流通必由於氣氣主於肺而為五臟之華蓋故為百脈之朝會皮毛者肺之合也是以輸精毛脈合精行氣於府肺主毛心主脈肺藏氣心生血一氣一血奉以生身一君一相皆處其上而行氣於氣府即膻中也府精神明留於四臟氣歸於權衡膻中即心胞絡為心之府權所受之精還稟命於神明神明屬心五臟之君主留當作流流其精於四臟則四臟之氣鹹得其平而歸於權衡矣權衡者平也故曰主明則下安主不明則十二官危權衡以平氣口成寸以決死生臟腑既平必朝宗於氣口成一寸之脈以決死生也飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺水飲入胃先輸於脾是以中焦如漚也脾氣散精朝於肺部象地氣上升而蒸為雲霧是以上焦如霧也通調水道下輸膀胱肺氣運行水隨而注故通調水道下輸膀胱是以下焦如瀆也若氣不能下化則小便不通故曰膀胱者州都之官津液藏焉氣化則能出矣水精四布五經並行合於四時五臟陰陽揆度以為常也脈化氣以行水分布於四臟則五臟並行矣合於四時者上輸象春夏之升下輸象秋冬之降也五臟陰陽者即散精淫精輸精是也如是則不愆於道揆法度矣故以為常也五運行大論帝曰病之生變何如岐伯曰氣相得則微不相得則甚相得者彼此相生則氣和而病微不相得者彼此相剋則氣乘而病甚帝曰主歲何如岐伯曰氣有餘則制己所勝而侮所不勝其不及則己所不勝侮而乘之已所勝輕而侮之主歲謂五運六氣各有所主之歲也己所勝我勝彼也所不勝彼勝我也假令木氣有餘則制己所勝而土受其克濕化乃衰侮所不勝則反受木之侮也木氣不足則己所不勝者金來侮之己所勝者土亦侮之侮反受邪侮而受邪寡於畏也恃我能勝侮之太甚則有勝必復反受其邪如木來剋土侮之太甚則脾土之子實肺金也乘木之虛來復母仇如吳王起傾國之兵與中國爭越乘其虛遂入而滅吳矣此因侮受其邪五行勝復之自然者也靈樞決氣篇曰兩神相搏合而成形常先身生是謂精兩神相搏即陰陽交媾精互而成形精為形先也本神篇曰兩精相搏謂之神此又曰兩神云云者蓋神為精宰精為神用神中有精精中亦有神也蓋以見神之虛靈無在不有精且先身而生神復先精而立前乎無始後乎無終知此者可與言神矣上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣氣屬陽本乎天者親上故在上焦開發宣布上焦如霧者是也邪客篇云宗氣積於胸中出於喉嚨以貫心肺而行呼吸焉刺節真邪論曰真氣者所受於天與穀氣並而充身也營衛生會篇曰人受氣於谷谷入於胃以傳於肺五臟六腑皆以受氣故能熏膚充身澤毛腠理發泄汗出溱溱是謂津津者陽之液汗者津之發也谷入氣滿淖澤注於骨骨屬屈伸泄澤補益腦髓皮膚潤澤是謂液液者陰之精谷入於胃氣滿而化液故能潤骨骨受潤故能屈伸經脈流故能泄澤內而補腦髓外而潤皮膚皆液也中焦受氣取汁變化而赤是謂血水穀必入於胃故中焦受谷運化精微變而為汁又變而赤以奉生身是名為血壅遏營氣令無所避是謂脈壅遏者堤防也猶道路之界江河之岸也俾營氣無所避而必行其中者謂之脈脈者非氣非血所以行氣行血者也精脫者耳聾耳為腎竅精脫則耳失其用矣氣脫者目不明臟腑之陽氣皆上注於目氣脫則目失其用矣津脫者腠理開汗大泄汗陽津也汗過多則津必脫故曰汗多亡陽液脫者骨屬屈伸不利色夭腦髓消脛痠耳數鳴液脫則骨髓枯故屈伸不利腦消脛痠色亦枯夭也耳鳴者液脫則腎虛也血脫者色白夭然不澤色之榮者血也血脫者色必枯白也愚按臟腑攸分固微渺也指而列之則有象可按矣古之至神者若見垣若內照咸用此耳然變變化化有不可以常法律者則象也而神矣故曰廢象者暗行膠象者待兔
